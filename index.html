  let fx=0;
  if(aCcy==="USD"&&bCcy==="KRW")fx=DATA.fx_usdkrw[yi]||0;

  else if(aCcy==="JPY"&&bCcy==="USD")fx=-(DATA.fx_usdjpy[yi]||0);
  else if(aCcy==="JPY"&&bCcy==="KRW")fx=(DATA.fx_usdkrw[yi]||0)-(DATA.fx_usdjpy[yi]||0);
  if(mode==="hedged"){const br=bCcy==="USD"?(DATA.us_cash[yi]||0):bCcy==="KRW"?(DATA.kr_cash[yi]||0):(DATA.jp_cash[yi]||0);const ar=aCcy==="USD"?(DATA.us_cash[yi]||0):aCcy==="KRW"?(DATA.kr_cash[yi]||0):(DATA.jp_cash[yi]||0);return-(br-ar)*0.8;}

}

    if(year===sYM.year&&gran==="monthly")sp=sYM.month-1;
    if(year===sYM.year&&gran==="quarterly")sp=Math.floor((sYM.month-1)/3);
    if(year===eYM.year&&gran==="monthly")ep=Math.min(eYM.month-1,maxP-1);
    if(year===eYM.year&&gran==="quarterly")ep=Math.min(Math.floor((eYM.month-1)/3),maxP-1);
    const aSub={};assets.forEach(a=>{const raw=DATA[a]?.[yi]||0;const fx=getFx(ASSETS[a]?.ccy||"USD",bCcy,fxMode,yi);const tot=raw+fx;aSub[a]=ppy===1?[tot/100]:splitRet(tot,ppy,tot+yi*3.7+a.charCodeAt(0));});
    for(let p=sp;p<=ep;p++){let pr=0;const contribs={};assets.forEach(a=>{const w=alloc[a]/100;const ar=aSub[a][p]||0;const adj=ar-drift*Math.abs(ar)/ppy;const c=w*adj;pr+=c;contribs[a]=c*100;});cum*=(1+pr);
      const label=ppy===1?`${year}`:gran==="quarterly"?`${year} ${qL[p]}`:`${year} ${mL[p]}`;
      results.push({label,year,period:p,return:pr*100,cumulative:cum,contributions:contribs});}
  }return results;
}
function stats(results,init){
  if(!results?.length)return null;
  const yM={};results.forEach(r=>{if(!yM[r.year])yM[r.year]=[];yM[r.year].push(r.return/100);});
  const aR=Object.entries(yM).map(([y,p])=>({year:+y,ret:p.reduce((c,r)=>c*(1+r),1)-1}));
  const n=aR.length,fin=results[results.length-1].cumulative;
  const tot=(fin/init-1)*100,cagr=n?(Math.pow(fin/init,1/n)-1)*100:0;
  const mean=aR.reduce((a,b)=>a+b.ret,0)/n;
  const vol=Math.sqrt(aR.reduce((a,b)=>a+Math.pow(b.ret-mean,2),0)/n)*100;
  const sharpe=vol?(cagr-4)/vol:0;
  let peak=init,mdd=0;results.forEach(r=>{if(r.cumulative>peak)peak=r.cumulative;const dd=(peak-r.cumulative)/peak;if(dd>mdd)mdd=dd;});
  const best=aR.reduce((a,b)=>b.ret>a.ret?b:a),worst=aR.reduce((a,b)=>b.ret<a.ret?b:a);
  return{totalReturn:tot.toFixed(1),cagr:cagr.toFixed(2),volatility:vol.toFixed(1),sharpe:sharpe.toFixed(2),mdd:(mdd*100).toFixed(1),bestYear:`${best.year} (${best.ret>0?"+":""}${(best.ret*100).toFixed(1)}%)`,worstYear:`${worst.year} (${(worst.ret*100).toFixed(1)}%)`,finalAmt:fin};
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TREND FOLLOWING вҖ” л©ҖнӢ° м „лһө м¶”м„ём¶”мў… + л°ұн…ҢмҠӨнҠё
   MAнҒ¬лЎңмҠӨ / MAм •л°°м—ҙ / лҜёл„Ҳл№„лӢҲ / RS / ліјлҰ°м Җ / ліҖлҸҷм„ұлҸҢнҢҢ / лӘЁл©ҳн…Җ
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const STRATEGIES=[
  {key:"maCross",name:"MA нҒ¬лЎңмҠӨ",desc:"лӢЁкё°MAк°Җ мһҘкё°MAлҘј мғҒн–ҘлҸҢнҢҢ мӢң л§ӨмҲҳ, н•ҳн–ҘлҸҢнҢҢ мӢң л§ӨлҸ„",color:"#A0785A"},
  {key:"maAlign",name:"MA м •л°°м—ҙ",desc:"5>20>60>120>200мқјм„  мҲңм„ңлЎң м •л°°м—ҙ мӢң л§ӨмҲҳ",color:"#7A6040"},
  {key:"minervini",name:"лҜёл„Ҳл№„лӢҲ Trend Template",desc:"200мқјм„  мҡ°мғҒн–Ҙ, мЈјк°Җ>150MA>200MA, 52мЈјм Җм җ+30%вҶ‘, 52мЈјкі м җ-25%вҶ“",color:"#5C7A5E"},

  {key:"momentum",name:"л“Җм–ј лӘЁл©ҳн…Җ",desc:"Nмқј мҲҳмқөлҘ мқҙ м–‘мҲҳмқҙл©ҙ л§ӨмҲҳ, мқҢмҲҳмқҙл©ҙ нҳ„кёҲ",color:"#7A6B5D"},
];

function TrendFollowing({trendState,setTrendState}){
  const st=trendState;
  const set=(k,v)=>setTrendState(p=>({...p,[k]:v}));
  const toggleStrat=(key)=>set("activeStrats",st.activeStrats.includes(key)?st.activeStrats.filter(k=>k!==key):[...st.activeStrats,key]);

  const[searchQ,setSearchQ]=useState("");
  const[searchResults,setSearchResults]=useState([]);
  const[kospiHist,setKospiHist]=useState(null);
  const searchRef=useRef(null);

  const doSearch=async(q)=>{if(!q)return setSearchResults([]);try{const r=await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(q)}`);const d=await r.json();setSearchResults(d.results||[]);}catch(e){}};
  const onSearchInput=(v)=>{setSearchQ(v);clearTimeout(searchRef.current);if(v.length>=1)searchRef.current=setTimeout(()=>doSearch(v),300);else setSearchResults([]);};

  const selectStock=async(symbol,name,code)=>{
    setSearchResults([]);setSearchQ(name+" ("+code+")");
    set("loading",true);set("error",null);set("selected",{symbol,name,code});
    try{
      const[hRes,kRes]=await Promise.all([
        fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(symbol)}&range=5y`).then(r=>r.json()),
        kospiHist?Promise.resolve(null):fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent("^KS11")}&range=5y`).then(r=>r.json())
      ]);
      set("history",hRes.history||[]);
      if(kRes)setKospiHist(kRes.history||[]);
    }catch(e){set("error","лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ.");}
    set("loading",false);
  };

  // в”Җв”Җ м§Җн‘ң кі„мӮ° мң нӢё в”Җв”Җ
  const calcMA=(data,period)=>data.map((d,i)=>i<period-1?null:data.slice(i-period+1,i+1).reduce((a,b)=>a+(b.adjClose||b.close),0)/period);
  const calcBB=(data,period=20,mult=2)=>{
    const ma=calcMA(data,period);
    return data.map((d,i)=>{
      if(ma[i]==null)return{upper:null,lower:null,mid:null};
      const slice=data.slice(i-period+1,i+1).map(x=>x.adjClose||x.close);
      const std=Math.sqrt(slice.reduce((a,v)=>a+Math.pow(v-ma[i],2),0)/period);
      return{upper:ma[i]+mult*std,lower:ma[i]-mult*std,mid:ma[i]};
    });
  };

  // в”Җв”Җ м „лһө мӢңк·ёл„җ кі„мӮ° в”Җв”Җ
  const strategyAnalysis=useMemo(()=>{
    const hist=st.history;
    if(!hist||hist.length<200)return null;
    const prices=hist.map(d=>d.adjClose||d.close);
    const ma5=calcMA(hist,5),ma20=calcMA(hist,20),ma60=calcMA(hist,60),ma120=calcMA(hist,120),ma200=calcMA(hist,200);
    const ma150=calcMA(hist,150);
    const bb=calcBB(hist,20,2);

    // мқјлі„ м „лһө мӢңк·ёл„җ (1=л§ӨмҲҳ, 0=мӨ‘лҰҪ, -1=л§ӨлҸ„)
    const signals=hist.map((d,i)=>{
      const p=prices[i];
      const sig={date:d.date,price:p,scores:{}};

      // 1. MA нҒ¬лЎңмҠӨ
      const sMA=st.maShort===5?ma5:ma20;
      const lMA=st.maLong===60?ma60:st.maLong===120?ma120:ma200;
      if(sMA[i]!=null&&lMA[i]!=null)sig.scores.maCross=sMA[i]>lMA[i]?1:-1;

      // 2. MA м •л°°м—ҙ
      if(ma5[i]&&ma20[i]&&ma60[i]&&ma120[i]&&ma200[i]){
        const aligned=ma5[i]>ma20[i]&&ma20[i]>ma60[i]&&ma60[i]>ma120[i]&&ma120[i]>ma200[i];
        const reverse=ma5[i]<ma20[i]&&ma20[i]<ma60[i]&&ma60[i]<ma120[i];
        sig.scores.maAlign=aligned?1:reverse?-1:0;
      }

      // 3. лҜёл„Ҳл№„лӢҲ Trend Template
      if(ma150[i]&&ma200[i]&&i>=252){
        const w52=prices.slice(Math.max(0,i-252),i+1);
        const w52High=Math.max(...w52),w52Low=Math.min(...w52);
        const ma200rising=ma200[i]>(ma200[Math.max(0,i-20)]||0);
        const aboveMAs=p>ma150[i]&&ma150[i]>ma200[i];
        const fromLow=(p/w52Low-1)>=0.3;
        const fromHigh=(1-p/w52High)<=0.25;
        const pass=ma200rising&&aboveMAs&&fromLow&&fromHigh;
        sig.scores.minervini=pass?1:-1;
        sig.minerviniDetail={ma200rising,aboveMAs,fromLow:((p/w52Low-1)*100).toFixed(1),fromHigh:((1-p/w52High)*100).toFixed(1)};
      }

      // 4. RS мғҒлҢҖк°•лҸ„
      if(kospiHist&&i>=60){
        const kMap={};kospiHist.forEach(k=>{kMap[k.date]=k.adjClose||k.close;});
        const today=kMap[d.date],past60=kMap[hist[Math.max(0,i-60)]?.date];
        if(today&&past60){
          const stockRet=(p/prices[Math.max(0,i-60)]-1)*100;
          const kospiRet=(today/past60-1)*100;
          const rs=stockRet-kospiRet;
          sig.scores.rs=rs>0?1:rs<-5?-1:0;
          sig.rsValue=rs;
        }
      }

      // 5. ліјлҰ°м Җ л°ҙл“ң
      if(bb[i].upper!=null){
        sig.scores.bollinger=p>bb[i].upper?1:p<bb[i].lower?-1:0;
        sig.bbUpper=bb[i].upper;sig.bbLower=bb[i].lower;sig.bbMid=bb[i].mid;
      }

      // 6. ліҖлҸҷм„ұ лҸҢнҢҢ
      if(i>0){
        const prev=hist[i-1];
        const prevRange=prev.high-prev.low;
        const target=(prev.adjClose||prev.close)+prevRange*st.breakoutK;
        sig.scores.breakout=d.high>=target?1:0;
        sig.breakoutTarget=target;
      }

      // 7. л“Җм–ј лӘЁл©ҳн…Җ
      if(i>=st.momPeriod){
        const ret=(p/prices[i-st.momPeriod]-1)*100;
        sig.scores.momentum=ret>0?1:-1;
        sig.momValue=ret;
      }

      // мў…н•© м җмҲҳ
      const active=st.activeStrats;
      const activeScores=active.map(k=>sig.scores[k]).filter(v=>v!=null);
      sig.totalScore=activeScores.reduce((a,b)=>a+Math.max(0,b),0);
      sig.maxScore=activeScores.length;
      sig.buySignal=st.conditionMode==="and"?activeScores.every(v=>v>=1):sig.totalScore>=st.minScore;
      return sig;
    });

    // в”Җв”Җ л°ұн…ҢмҠӨнҠё в”Җв”Җ
    let cash=st.initAmt,shares=0,position=false,buyPrice=0;
    const equity=[],trades=[];
    for(let i=200;i<signals.length;i++){
      const sig=signals[i];
      const p=sig.price;
      if(!position&&sig.buySignal){
        shares=Math.floor(cash/p);
        if(shares>0){buyPrice=p;cash-=shares*p;position=true;trades.push({type:"buy",date:sig.date,price:p,score:sig.totalScore});}
      }else if(position&&!sig.buySignal){
        cash+=shares*p;const ret=(p/buyPrice-1)*100;
        trades.push({type:"sell",date:sig.date,price:p,ret:ret.toFixed(1)});shares=0;position=false;
      }
      const totalValue=cash+(shares*p);
      equity.push({date:sig.date,value:totalValue,price:p,score:sig.totalScore,buy:sig.buySignal});
    }
    if(position)cash+=shares*signals[signals.length-1].price;
    const finalValue=cash;

    // нҶөкі„
    const buyTrades=trades.filter(t=>t.type==="sell");
    const wins=buyTrades.filter(t=>parseFloat(t.ret)>0).length;
    const totalReturn=(finalValue/st.initAmt-1)*100;
    const years=(signals.length-200)/252;
    const cagr=years>0?(Math.pow(finalValue/st.initAmt,1/years)-1)*100:0;
    let peak=st.initAmt,mdd=0;
    equity.forEach(e=>{if(e.value>peak)peak=e.value;const dd=(peak-e.value)/peak;if(dd>mdd)mdd=dd;});

    // м°ЁнҠё лҚ°мқҙн„°
    const step=Math.max(1,Math.floor(equity.length/300));
    const chartData=equity.filter((_,i)=>i%step===0||i===equity.length-1);

    // нҳ„мһ¬ мғҒнғң лҢҖмӢңліҙл“ң
    const latest=signals[signals.length-1];

    return{signals,equity,chartData,trades,latest,
      stats:{totalReturn:totalReturn.toFixed(1),cagr:cagr.toFixed(2),mdd:(mdd*100).toFixed(1),
        trades:buyTrades.length,winRate:buyTrades.length?(wins/buyTrades.length*100).toFixed(1):"0",
        wins,losses:buyTrades.length-wins,finalValue:Math.round(finalValue)}};
  },[st.history,st.activeStrats,st.conditionMode,st.minScore,st.maShort,st.maLong,st.breakoutK,st.momPeriod,st.initAmt,kospiHist]);

  const fmtNum=(v)=>{if(v==null)return"вҖ”";return Number(v).toLocaleString("ko-KR");};
  const fmtKRW=(v)=>{if(v==null)return"вҖ”";return Number(v).toLocaleString("ko-KR")+"мӣҗ";};
  const retColor=(v)=>v>0?"#5C7A5E":v<0?"#8B4049":"#7A7067";

  // в”Җв”Җ нғҖмһ„н”„л Ҳмһ„м—җ л§һлҠ” range мһҗлҸҷ кІ°м • в”Җв”Җ
  const intervalToRange=(iv)=>{
    if(iv==="1m"||iv==="2m")return"7d";
    if(iv==="5m"||iv==="15m"||iv==="30m")return"60d";
    if(iv==="60m"||iv==="90m"||iv==="1h")return"730d";
    if(iv==="1wk")return"5y";
    if(iv==="1mo")return"max";
    return"5y";
  };

  // в”Җв”Җ мў…лӘ© м„ нғқ мӢң мһ¬лЎңл”© (нғҖмһ„н”„л Ҳмһ„ ліҖкІҪ л°ҳмҳҒ) в”Җв”Җ
  useEffect(()=>{
    if(!st.selected)return;
    const reload=async()=>{
      set("loading",true);
      try{
        const range=intervalToRange(st.timeframe);
        const[hRes,kRes]=await Promise.all([
          fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(st.selected.symbol)}&range=${range}&interval=${st.timeframe}`).then(r=>r.json()),
          fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent("^KS11")}&range=${range}&interval=${st.timeframe}`).then(r=>r.json())
        ]);
        set("history",hRes.history||[]);
        setKospiHist(kRes.history||[]);
      }catch(e){set("error","лҚ°мқҙн„° лЎңл”© мӢӨнҢЁ");}
      set("loading",false);
    };
    reload();
  },[st.timeframe]);

  // в”Җв”Җ мҠӨнҒ¬лҰ¬л„Ҳ: м „мІҙ мў…лӘ© мқјкҙ„ л¶„м„қ в”Җв”Җ
  const runScreener=async()=>{
    set("screenerLoading",true);set("screenerResults",null);
    try{
      const range=intervalToRange(st.timeframe);
      const res=await fetch(`${WORKER_URL}/api/screener?range=${range}&interval=${st.timeframe}`);
      const data=await res.json();
      // KOSPI лҚ°мқҙн„°лҸ„ к°Җм ёмҳӨкё° (RS кі„мӮ°мҡ©)
      const kRes=await fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent("^KS11")}&range=${range}&interval=${st.timeframe}`).then(r=>r.json());
      setKospiHist(kRes.history||[]);
      // к°Ғ мў…лӘ©м—җ лҢҖн•ҙ мӢңк·ёл„җ кі„мӮ°
      const results=(data.stocks||[]).map(s=>{
        if(!s.history||s.history.length<200)return null;
        const sig=evaluateSignals(s.history,kRes.history||[]);
        return{...s,signals:sig.signals,scores:sig.scores,totalScore:sig.totalScore,maxScore:sig.maxScore,buySignal:sig.buySignal,currentPrice:s.history[s.history.length-1]?.adjClose||s.history[s.history.length-1]?.close,details:sig.details};
      }).filter(Boolean);
      set("screenerResults",results);
    }catch(e){set("error","мҠӨнҒ¬лҰ¬л„Ҳ мӢӨн–ү мӢӨнҢЁ");}
    set("screenerLoading",false);
  };

  // мӢңк·ёл„җ нҸүк°Җ н•ЁмҲҳ (лӢЁмқј мў…лӘ© мөңмӢ  мӢңм җ)
  const evaluateSignals=(hist,kHist)=>{
    if(hist.length<200)return{signals:{},scores:{},totalScore:0,maxScore:0,buySignal:false,details:{}};
    const prices=hist.map(d=>d.adjClose||d.close);
    const ma5=calcMA(hist,5),ma20=calcMA(hist,20),ma60=calcMA(hist,60),ma120=calcMA(hist,120),ma200=calcMA(hist,200),ma150=calcMA(hist,150);
    const bb=calcBB(hist,20,2);
    const i=hist.length-1;
    const p=prices[i];
    const scores={};const details={};

    // MA нҒ¬лЎңмҠӨ
    const sMA=st.maShort===5?ma5:ma20;
    const lMA=st.maLong===60?ma60:st.maLong===120?ma120:ma200;
    if(sMA[i]!=null&&lMA[i]!=null)scores.maCross=sMA[i]>lMA[i]?1:-1;

    // MA м •л°°м—ҙ
    if(ma5[i]&&ma20[i]&&ma60[i]&&ma120[i]&&ma200[i]){
      const aligned=ma5[i]>ma20[i]&&ma20[i]>ma60[i]&&ma60[i]>ma120[i]&&ma120[i]>ma200[i];
      scores.maAlign=aligned?1:0;
    }

    // лҜёл„Ҳл№„лӢҲ
    if(ma150[i]&&ma200[i]&&i>=252){
      const w52=prices.slice(Math.max(0,i-252),i+1);
      const w52High=Math.max(...w52),w52Low=Math.min(...w52);
      const ma200rising=ma200[i]>(ma200[Math.max(0,i-20)]||0);
      const aboveMAs=p>ma150[i]&&ma150[i]>ma200[i];
      const fromLow=(p/w52Low-1)>=0.3;
      const fromHigh=(1-p/w52High)<=0.25;
      scores.minervini=ma200rising&&aboveMAs&&fromLow&&fromHigh?1:0;
      details.fromHigh=((1-p/w52High)*100).toFixed(1);
      details.fromLow=((p/w52Low-1)*100).toFixed(1);
    }

    // RS
    if(kHist&&kHist.length>60&&i>=60){
      const kMap={};kHist.forEach(k=>{kMap[k.date]=k.adjClose||k.close;});
      const today=kMap[hist[i].date],past60=kMap[hist[Math.max(0,i-60)]?.date];
      if(today&&past60){
        const stockRet=(p/prices[Math.max(0,i-60)]-1)*100;
        const kospiRet=(today/past60-1)*100;
        const rs=stockRet-kospiRet;
        scores.rs=rs>0?1:rs<-5?-1:0;
        details.rs=rs.toFixed(1);
      }
    }

    // ліјлҰ°м Җ
    if(bb[i].upper!=null)scores.bollinger=p>bb[i].upper?1:p<bb[i].lower?-1:0;

    // ліҖлҸҷм„ұ лҸҢнҢҢ
    if(i>0){
      const prev=hist[i-1];
      const prevRange=prev.high-prev.low;
      const target=(prev.adjClose||prev.close)+prevRange*st.breakoutK;
      scores.breakout=hist[i].high>=target?1:0;
    }

    // лӘЁл©ҳн…Җ
    if(i>=st.momPeriod){
      const ret=(p/prices[i-st.momPeriod]-1)*100;
      scores.momentum=ret>0?1:-1;
      details.momentum=ret.toFixed(1);
    }

    const active=st.activeStrats;
    const activeScores=active.map(k=>scores[k]).filter(v=>v!=null);
    const totalScore=activeScores.reduce((a,b)=>a+Math.max(0,b),0);
    const maxScore=activeScores.length;
    const buySignal=st.conditionMode==="and"?activeScores.every(v=>v>=1):totalScore>=st.minScore;
    return{signals:scores,scores,totalScore,maxScore,buySignal,details};
  };

          {/* мҡ”м•Ҫ м№ҙл“ң */}
          {(()=>{
            const buyList=st.screenerResults.filter(r=>r.buySignal).sort((a,b)=>b.totalScore-a.totalScore);
            const watchList=st.screenerResults.filter(r=>!r.buySignal&&r.totalScore>=Math.max(1,st.minScore-1)).sort((a,b)=>b.totalScore-a.totalScore);
            return(
              <>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:20}}>
                  <div style={{background:"rgba(92,122,94,0.08)",border:"1px solid rgba(92,122,94,0.2)",borderRadius:8,padding:"14px 18px"}}>
