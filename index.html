                  <div style={{background:"#FAF8F5",border:"1px solid #E8E2DA",borderRadius:8,padding:"14px 18px"}}>
                    <div style={{fontSize:10,color:"#7A7067",marginBottom:4}}>нҷңм„ұ м „лһө</div>
                    <div style={{fontSize:14,fontWeight:600,color:"#2D2926"}}>{st.activeStrats.length}к°ң</div>
                  </div>
                  <div style={{background:"#FAF8F5",border:"1px solid #E8E2DA",borderRadius:8,padding:"14px 18px"}}>
                    <div style={{fontSize:10,color:"#7A7067",marginBottom:4}}>л§ӨмҲҳ мЎ°кұҙ</div>
                    <div style={{fontSize:14,fontWeight:600,color:"#2D2926"}}>{st.conditionMode==="and"?"м „мІҙ м¶©мЎұ":`${st.minScore}к°ң+ м¶©мЎұ`}</div>
                  </div>
                </div>

                {/* л§ӨмҲҳ мӢңк·ёл„җ н…Ңмқҙлё” */}
                <div style={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>рҹҹў л§ӨмҲҳ мӢңк·ёл„җ мў…лӘ© ({buyList.length})</div>
                  {buyList.length===0?(
                    <div style={{textAlign:"center",padding:30,color:"#9E958C",fontSize:13}}>нҳ„мһ¬ л§ӨмҲҳ мЎ°кұҙмқ„ м¶©мЎұн•ҳлҠ” мў…лӘ©мқҙ м—ҶмҠөлӢҲлӢӨ.<br/><span style={{fontSize:11}}>мЎ°кұҙмқ„ мҷ„нҷ”н•ҳкұ°лӮҳ лӢӨлҘё м „лһөмқ„ нҷңм„ұнҷ”н•ҙліҙм„ёмҡ”.</span></div>
                  ):(
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead><tr>{["мҲңмң„","мў…лӘ©","мӢңмһҘ","м„№н„°","нҳ„мһ¬к°Җ","м җмҲҳ",...STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>s.name)].map((h,i)=>
                          <th key={i} style={{textAlign:"left",padding:"8px 10px",fontSize:10,color:"#9E958C",borderBottom:"2px solid #E8E2DA",fontWeight:500,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                        <tbody>{buyList.map((r,i)=>(
                          <tr key={r.symbol} style={{borderBottom:"1px solid #F0EDE8"}}>
                            <td style={{padding:"8px 10px",fontFamily:"'DM Mono'",color:"#A0785A",fontWeight:600}}>#{i+1}</td>
                            <td style={{padding:"8px 10px"}}><span style={{fontFamily:"'DM Mono'",fontSize:10,color:"#A0785A",fontWeight:600,marginRight:6}}>{r.code}</span><span style={{fontSize:12,fontWeight:600}}>{r.name}</span></td>
                            <td style={{padding:"8px 10px"}}><span style={{fontSize:9,color:r.market==="KOSDAQ"?"#A0785A":"#5C7A5E",background:r.market==="KOSDAQ"?"rgba(160,120,90,0.08)":"rgba(92,122,94,0.08)",padding:"2px 6px",borderRadius:3,fontWeight:600}}>{r.market}</span></td>
                            <td style={{padding:"8px 10px",fontSize:11,color:"#7A7067"}}>{r.sector}</td>
                            <td style={{padding:"8px 10px",fontFamily:"'DM Mono'"}}>{fmtKRW(r.currentPrice)}</td>
                            <td style={{padding:"8px 10px"}}><span style={{background:"rgba(92,122,94,0.1)",color:"#5C7A5E",padding:"3px 8px",borderRadius:4,fontFamily:"'DM Mono'",fontWeight:700,fontSize:11}}>{r.totalScore}/{r.maxScore}</span></td>
                            {STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>(
                              <td key={s.key} style={{padding:"8px 10px",textAlign:"center",fontSize:14}}>{r.scores[s.key]>=1?"вң…":r.scores[s.key]<=-1?"вқҢ":"вҸёпёҸ"}</td>
                            ))}
                          </tr>
                        ))}</tbody>
                      </table>
                    </div>
                  )}
                </div>

                {/* кҙҖмӢ¬ мў…лӘ© н…Ңмқҙлё” */}
                {watchList.length>0&&(
                  <div style={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px"}}>
                    <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>рҹ‘Җ кҙҖмӢ¬ мў…лӘ© ({watchList.length})</div>
                    <div style={{fontSize:11,color:"#9E958C",marginBottom:14}}>л§ӨмҲҳ мЎ°кұҙм—җлҠ” лҜёлӢ¬н•ҳм§Җл§Ң мқјл¶Җ мӢңк·ёл„җмқҙ м¶©мЎұлҗң мў…лӘ©</div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead><tr>{["мў…лӘ©","мӢңмһҘ","нҳ„мһ¬к°Җ","м җмҲҳ",...STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>s.name)].map((h,i)=>
                          <th key={i} style={{textAlign:"left",padding:"8px 10px",fontSize:10,color:"#9E958C",borderBottom:"2px solid #E8E2DA",fontWeight:500,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                        <tbody>{watchList.slice(0,20).map(r=>(
                          <tr key={r.symbol} style={{borderBottom:"1px solid #F0EDE8"}}>
                            <td style={{padding:"8px 10px"}}><span style={{fontFamily:"'DM Mono'",fontSize:10,color:"#A0785A",fontWeight:600,marginRight:6}}>{r.code}</span><span style={{fontSize:12,fontWeight:500}}>{r.name}</span></td>
                            <td style={{padding:"8px 10px"}}><span style={{fontSize:9,color:r.market==="KOSDAQ"?"#A0785A":"#5C7A5E",fontWeight:600}}>{r.market}</span></td>
                            <td style={{padding:"8px 10px",fontFamily:"'DM Mono'"}}>{fmtKRW(r.currentPrice)}</td>
                            <td style={{padding:"8px 10px"}}><span style={{background:"rgba(160,120,90,0.1)",color:"#A0785A",padding:"3px 8px",borderRadius:4,fontFamily:"'DM Mono'",fontWeight:600,fontSize:11}}>{r.totalScore}/{r.maxScore}</span></td>
                            {STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>(
                              <td key={s.key} style={{padding:"8px 10px",textAlign:"center",fontSize:13}}>{r.scores[s.key]>=1?"вң…":r.scores[s.key]<=-1?"вқҢ":"вҸёпёҸ"}</td>
                            ))}
                          </tr>
                        ))}</tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}
      {st.mode==="screener"&&!st.screenerLoading&&!st.screenerResults&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#9E958C"}}>
          <div style={{fontSize:40,marginBottom:16}}>рҹ”Қ</div>
          <div style={{fontSize:16,fontWeight:600,color:"#7A7067",marginBottom:10}}>м „мІҙ мў…лӘ© мһҗлҸҷ мҠӨнҒ¬лҰ¬лӢқ</div>
          <div style={{fontSize:12,lineHeight:2,maxWidth:440,margin:"0 auto"}}>
            мң„м—җм„ң м „лһөкіј мЎ°кұҙмқ„ м„Өм •н•ң нӣ„ <strong style={{color:"#A0785A"}}>"мҠӨнҒ¬лҰ¬лӢқ мӢӨн–ү"</strong> лІ„нҠјмқ„ лҲ„лҘҙл©ҙ<br/>
            60к°ң н•ңкөӯ мЈјмҡ” мў…лӘ©мқ„ лӘЁл‘җ л¶„м„қн•ҙм„ң л§ӨмҲҳ мӢңк·ёл„җ мў…лӘ©л§Ң ліҙм—¬мӨҚлӢҲлӢӨ.
          </div>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   CORRELATION вҖ” л§ӨнҒ¬лЎң мғҒкҙҖкҙҖкі„ л¶„м„қ нғӯ
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const MACRO_INDICATORS=[
  {key:"kospi",ticker:"^KS11",name:"KOSPI",color:"#8B4049"},
  {key:"sp500",ticker:"^GSPC",name:"S&P 500",color:"#2D2926"},
  {key:"nasdaq",ticker:"^IXIC",name:"лӮҳмҠӨлӢҘ",color:"#5C7A5E"},
  {key:"usd10y",ticker:"^TNX",name:"лҜёкөӯ 10л…„л¬ј кёҲлҰ¬",color:"#6B8CA0"},
  {key:"vix",ticker:"^VIX",name:"VIX кіөнҸ¬м§ҖмҲҳ",color:"#9E7080"},
  {key:"dxy",ticker:"DX-Y.NYB",name:"лӢ¬лҹ¬ мқёлҚұмҠӨ",color:"#7A6040"},
  {key:"krwusd",ticker:"KRW=X",name:"мӣҗ/лӢ¬лҹ¬ нҷҳмңЁ",color:"#A0785A"},
  {key:"wti",ticker:"CL=F",name:"WTI мң к°Җ",color:"#7A6B5D"},
  {key:"gold",ticker:"GC=F",name:"кёҲ",color:"#C4A882"},
  {key:"copper",ticker:"HG=F",name:"кө¬лҰ¬",color:"#A06B4F"},
];

function CorrelationTab({corrState,setCorrState}){
  const st=corrState;
  const set=(k,v)=>setCorrState(p=>({...p,[k]:v}));

  const loadData=async()=>{
    if(st.loaded)return;
    set("loading",true);
    const allData={};
    for(const ind of MACRO_INDICATORS){
      try{
        const res=await fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(ind.ticker)}&range=5y`);
        const d=await res.json();
        allData[ind.key]=(d.history||[]).map(h=>({date:h.date,price:h.adjClose||h.close}));
      }catch(e){allData[ind.key]=[];}
    }
    set("data",allData);set("loaded",true);set("loading",false);
  };

  useEffect(()=>{loadData();},[]);

  // мғҒкҙҖкі„мҲҳ кі„мӮ°
  const pearson=(x,y)=>{
    const n=Math.min(x.length,y.length);if(n<10)return null;
    const mx=x.slice(0,n).reduce((a,b)=>a+b,0)/n;
    const my=y.slice(0,n).reduce((a,b)=>a+b,0)/n;
    let num=0,dx=0,dy=0;
    for(let i=0;i<n;i++){const xi=x[i]-mx,yi=y[i]-my;num+=xi*yi;dx+=xi*xi;dy+=yi*yi;}
    return dx&&dy?num/Math.sqrt(dx*dy):0;
  };

  // мқјк°„ мҲҳмқөлҘ лЎң ліҖнҷҳ
  const toReturns=(data)=>{
    const rets=[];
    for(let i=1;i<data.length;i++){
      if(data[i].price&&data[i-1].price)rets.push({date:data[i].date,ret:(data[i].price/data[i-1].price-1)*100});
    }
    return rets;
  };

  // мғҒкҙҖкҙҖкі„ л§ӨнҠёлҰӯмҠӨ
  const corrMatrix=useMemo(()=>{
    if(!st.loaded||!st.data)return null;
    const keys=MACRO_INDICATORS.map(i=>i.key);
    const returns={};
    keys.forEach(k=>{returns[k]=toReturns(st.data[k]||[]);});

    const matrix={};
    keys.forEach(k1=>{
      matrix[k1]={};
      keys.forEach(k2=>{
        if(k1===k2){matrix[k1][k2]=1;return;}
        // лӮ м§ң л§Өм№ӯ
        const r1Map={};returns[k1].forEach(r=>{r1Map[r.date]=r.ret;});
        const paired=returns[k2].filter(r=>r1Map[r.date]!=null).map(r=>({x:r1Map[r.date],y:r.ret}));
        if(paired.length<30){matrix[k1][k2]=null;return;}
        matrix[k1][k2]=pearson(paired.map(p=>p.x),paired.map(p=>p.y));
      });
    });
    return matrix;
  },[st.loaded,st.data]);

  // л“Җм–ј м°ЁнҠё лҚ°мқҙн„°
  const dualChartData=useMemo(()=>{
    if(!st.data||!st.dualA||!st.dualB)return[];
    const a=st.data[st.dualA]||[];
    const b=st.data[st.dualB]||[];
    const bMap={};b.forEach(d=>{bMap[d.date]=d.price;});
    const step=Math.max(1,Math.floor(a.length/200));
    return a.filter((_,i)=>i%step===0).map(d=>({date:d.date,a:d.price,b:bMap[d.date]||null})).filter(d=>d.b!=null);
  },[st.data,st.dualA,st.dualB]);

  const corrColor=(v)=>{
    if(v==null)return"#E8E2DA";
    const abs=Math.abs(v);
    if(v>0)return`rgba(92,122,94,${abs*0.8+0.1})`;
    return`rgba(139,64,73,${abs*0.8+0.1})`;
  };

  const indName=(key)=>MACRO_INDICATORS.find(i=>i.key===key)?.name||key;

  return(
    <div style={{padding:"28px 48px",minHeight:"60vh"}}>
      {st.loading&&<div style={{textAlign:"center",padding:60,color:"#A0785A",fontSize:13}}>кёҖлЎңлІҢ л§ӨнҒ¬лЎң лҚ°мқҙн„° лЎңл”© мӨ‘... (10к°ң м§Җн‘ң)</div>}

      {st.loaded&&corrMatrix&&(
        <div style={{animation:"fadeIn 0.3s ease"}}>
          {/* нһҲнҠёл§ө */}
          <div style={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>мғҒкҙҖкҙҖкі„ нһҲнҠёл§ө</div>
            <div style={{fontSize:11,color:"#9E958C",marginBottom:16}}>мқјк°„ мҲҳмқөлҘ  кё°л°ҳ н”јм–ҙмҠЁ мғҒкҙҖкі„мҲҳ В· мөңк·ј 5л…„</div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontSize:11,fontFamily:"'DM Mono'"}}>
                <thead><tr><th style={{padding:6}}></th>{MACRO_INDICATORS.map(ind=><th key={ind.key} style={{padding:"6px 4px",fontSize:9,color:"#7A7067",fontWeight:500,writingMode:"vertical-rl",height:80,textAlign:"left"}}>{ind.name}</th>)}</tr></thead>
                <tbody>{MACRO_INDICATORS.map(row=>(
                  <tr key={row.key}>
                    <td style={{padding:"6px 8px",fontSize:10,color:"#4A4440",fontWeight:500,whiteSpace:"nowrap"}}>{row.name}</td>
                    {MACRO_INDICATORS.map(col=>{
                      const v=corrMatrix[row.key]?.[col.key];
                      return(<td key={col.key} style={{padding:4,textAlign:"center",cursor:"pointer"}}
                        onClick={()=>{set("dualA",row.key);set("dualB",col.key);}}>
                        <div style={{width:44,height:32,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:4,
                          background:corrColor(v),color:v!=null&&Math.abs(v)>0.3?"#fff":"#4A4440",fontSize:10,fontWeight:v!=null&&Math.abs(v)>0.5?600:400}}>
                          {v!=null?v.toFixed(2):"вҖ”"}
                        </div>
                      </td>);
                    })}
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{fontSize:10,color:"#9E958C",marginTop:10}}>м…Җмқ„ нҒҙлҰӯн•ҳл©ҙ м•„лһҳм—җм„ң л‘җ м§Җн‘ңмқҳ м¶”мқҙлҘј л№„көҗн•  мҲҳ мһҲмҠөлӢҲлӢӨ</div>
          </div>

          {/* л“Җм–ј м°ЁнҠё */}
          {st.dualA&&st.dualB&&dualChartData.length>0&&(
            <div style={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:15,fontWeight:700}}>{indName(st.dualA)} vs {indName(st.dualB)}</div>
                <div style={{fontSize:11,color:"#9E958C",fontFamily:"'DM Mono'"}}>мғҒкҙҖкі„мҲҳ: <span style={{fontWeight:600,color:corrMatrix[st.dualA]?.[st.dualB]>0?"#5C7A5E":"#8B4049"}}>{corrMatrix[st.dualA]?.[st.dualB]?.toFixed(3)||"вҖ”"}</span></div>
              </div>
              <ResponsiveContainer width="100%" height={350}>
                <LineChart data={dualChartData} margin={{top:5,right:60,bottom:5,left:10}}>
                  <CartesianGrid stroke="rgba(26,35,50,0.06)"/>
                  <XAxis dataKey="date" tick={{fill:"#9E958C",fontSize:10,fontFamily:"'DM Mono'"}} tickLine={false} interval={Math.max(0,Math.floor(dualChartData.length/8))}
                    tickFormatter={d=>{const[y,m]=d.split("-");return`${y.slice(2)}.${m}`;}}/>
                  <YAxis yAxisId="left" tick={{fill:"#A0785A",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false}/>
                  <YAxis yAxisId="right" orientation="right" tick={{fill:"#5C7A5E",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false}/>
                  <Tooltip contentStyle={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:11}}
                    formatter={(v,name)=>[Number(v).toFixed(2),name==="a"?indName(st.dualA):indName(st.dualB)]}/>
                  <Line yAxisId="left" type="monotone" dataKey="a" stroke="#A0785A" strokeWidth={2} dot={false} name="a"/>
                  <Line yAxisId="right" type="monotone" dataKey="b" stroke="#5C7A5E" strokeWidth={2} dot={false} name="b"/>
                </LineChart>
              </ResponsiveContainer>
              <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:8}}>
                <span style={{fontSize:11,color:"#A0785A"}}>в”Ғ {indName(st.dualA)} (мўҢм¶•)</span>
                <span style={{fontSize:11,color:"#5C7A5E"}}>в”Ғ {indName(st.dualB)} (мҡ°м¶•)</span>
              </div>
            </div>
          )}

          {/* м§Җн‘ң м„ нғқ */}
          <div style={{background:"#FAF8F5",border:"1px solid #E8E2DA",borderRadius:12,padding:"16px 24px"}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>л№„көҗн•  м§Җн‘ң м„ нғқ</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {MACRO_INDICATORS.map(ind=>(
                <button key={ind.key} className={`gb ${st.dualA===ind.key||st.dualB===ind.key?"on":""}`}
                  onClick={()=>{if(st.dualA===ind.key)return;if(st.dualB===ind.key)return;set("dualB",st.dualA);set("dualA",ind.key);}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:ind.color,display:"inline-block",marginRight:4}}/>
                  {ind.name}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   STOCK EXPLORER вҖ” н•ңкөӯ мў…лӘ© кІҖмғү/л¶„м„қ нғӯ
   лӢ¬л Ҙ кё°к°„ м„ нғқ + л©ҖнӢ° мў…лӘ© л№„көҗ м°ЁнҠё
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const COMPARE_COLORS=["#A0785A","#5C7A5E","#8B4049","#6B8CA0","#7A6040","#9E7080"];

function StockExplorer({stockState,setStockState}){
  const st=stockState;
  const set=(k,v)=>setStockState(p=>({...p,[k]:v}));
  const stocks=st.stocks||[];
  const setStocks=(fn)=>set("stocks",typeof fn==="function"?fn(stocks):fn);

  const[query,setQuery]=useState("");
  const[results,setResults]=useState([]);
  const[searching,setSearching]=useState(false);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const searchTimeout=useRef(null);

  const doSearch=async(q)=>{
    if(!q||q.length<1)return setResults([]);
    setSearching(true);
    try{
      const r=await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(q)}`);
      const d=await r.json();
      setResults(d.results||[]);
    }catch(e){setError("кІҖмғү м„ңлІ„м—җ м—°кІ°н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.");}
    setSearching(false);
  };

  const onInput=(v)=>{
    setQuery(v);setError(null);
    clearTimeout(searchTimeout.current);
    if(v.length>=1)searchTimeout.current=setTimeout(()=>doSearch(v),300);
    else setResults([]);
  };

  const addStock=async(symbol,name,code)=>{
    if(stocks.find(s=>s.symbol===symbol))return;
    if(stocks.length>=6){setError("мөңлҢҖ 6к°ңк№Ңм§Җ л№„көҗн•  мҲҳ мһҲмҠөлӢҲлӢӨ.");return;}
    setResults([]);setQuery("");setLoading(true);setError(null);
    try{
      const[qRes,hRes]=await Promise.all([
        fetch(`${WORKER_URL}/api/quote?symbol=${encodeURIComponent(symbol)}`).then(r=>r.json()),
        fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(symbol)}&range=5y`).then(r=>r.json())
      ]);
      const color=COMPARE_COLORS[stocks.length%COMPARE_COLORS.length];
      setStocks(prev=>[...prev,{symbol,name,code,quote:qRes.quote,history:hRes.history||[],color}]);
    }catch(e){setError("лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ.");}
    setLoading(false);
  };

  const removeStock=(symbol)=>setStocks(prev=>prev.filter(s=>s.symbol!==symbol));

  // лӮ м§ң н•„н„°л§Ғлҗң нһҲмҠӨнҶ лҰ¬
  const filteredStocks=useMemo(()=>{
    return stocks.map(s=>{
      const filtered=s.history.filter(d=>d.date>=st.startDate&&d.date<=st.endDate);
      return{...s,filtered};
    });
  },[stocks,st.startDate,st.endDate]);

  // л№„көҗ м°ЁнҠё лҚ°мқҙн„° (мҲҳмқөлҘ  кё°мӨҖ м •к·ңнҷ”)
  const chartData=useMemo(()=>{
    if(!filteredStocks.length)return[];
    const allDates=[...new Set(filteredStocks.flatMap(s=>s.filtered.map(d=>d.date)))].sort();
    const step=Math.max(1,Math.floor(allDates.length/250));
    const sampledDates=allDates.filter((_,i)=>i%step===0||i===allDates.length-1);

    return sampledDates.map(date=>{
      const pt={date};
      filteredStocks.forEach(s=>{
        const rec=s.filtered.find(d=>d.date===date)||s.filtered.reduce((prev,curr)=>(!prev||curr.date<=date?curr:prev),null);
        if(!rec)return;
        const price=rec.adjClose||rec.close;
        if(st.chartMode==="percent"){
          const base=s.filtered[0];
          const basePrice=base?(base.adjClose||base.close):price;
          pt[s.symbol]=basePrice?((price/basePrice-1)*100):0;
        }else{
          pt[s.symbol]=price;
        }
      });
      return pt;
    });
  },[filteredStocks,st.chartMode]);

  // кё°к°„ мҲҳмқөлҘ  кі„мӮ°
  const calcReturns=(hist)=>{
    if(!hist||hist.length<2)return{};
    const last=hist[hist.length-1];
    const getReturn=(days)=>{
      const idx=Math.max(0,hist.length-1-days);
      const base=hist[idx];if(!base)return null;
      return((last.adjClose||last.close)/(base.adjClose||base.close)-1)*100;
    };
    const first=hist[0];
    const periodReturn=first?((last.adjClose||last.close)/(first.adjClose||first.close)-1)*100:null;
    return{d1:getReturn(1),w1:getReturn(5),m1:getReturn(21),m3:getReturn(63),m6:getReturn(126),y1:getReturn(252),period:periodReturn};
  };

  const fmtKRW=(v)=>{if(v==null||isNaN(v))return"вҖ”";return Number(v).toLocaleString("ko-KR")+"мӣҗ";};
  const fmtNum=(v)=>{if(v==null||isNaN(v))return"вҖ”";return Number(v).toLocaleString("ko-KR");};
  const fmtBig=(v)=>{if(!v)return"вҖ”";const n=Number(v);if(n>=1e12)return`${(n/1e12).toFixed(1)}мЎ°`;if(n>=1e8)return`${(n/1e8).toFixed(0)}м–ө`;if(n>=1e4)return`${(n/1e4).toFixed(0)}л§Ң`;return n.toLocaleString("ko-KR");};
  const retColor=(v)=>v>0?"#5C7A5E":v<0?"#8B4049":"#7A7067";
  const retFmt=(v)=>v==null?"вҖ”":`${v>0?"+":""}${v.toFixed(2)}%`;

  const presets=[
    {label:"1к°ңмӣ”",fn:()=>{const d=new Date();const s=new Date();s.setMonth(s.getMonth()-1);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"3к°ңмӣ”",fn:()=>{const d=new Date();const s=new Date();s.setMonth(s.getMonth()-3);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"6к°ңмӣ”",fn:()=>{const d=new Date();const s=new Date();s.setMonth(s.getMonth()-6);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"1л…„",fn:()=>{const d=new Date();const s=new Date();s.setFullYear(s.getFullYear()-1);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"3л…„",fn:()=>{const d=new Date();const s=new Date();s.setFullYear(s.getFullYear()-3);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"5л…„",fn:()=>{const d=new Date();const s=new Date();s.setFullYear(s.getFullYear()-5);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
  ];

  return(
    <div style={{padding:"28px 48px",minHeight:"60vh"}}>
      {/* кІҖмғү + мў…лӘ© нғңк·ё */}
      <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap",marginBottom:20}}>
        <div style={{position:"relative",width:400}}>
          <div style={{position:"relative"}}>
            <input type="text" value={query} onChange={e=>onInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&results.length>0){const r=results[0];addStock(r.symbol,r.name,r.code);}}}
              placeholder="мў…лӘ© м¶”к°Җ (мҳҲ: мӮјм„ұм „мһҗ, 005930)"
              style={{width:"100%",padding:"11px 16px 11px 38px",background:"#fff",border:"1px solid #D6CEC4",borderRadius:8,fontSize:13,fontFamily:"'Noto Sans KR'",color:"#1A1A1A",outline:"none"}}/>
            <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9E958C",pointerEvents:"none"}}>рҹ”Қ</span>
          </div>
          {searching&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #E8E2DA",borderRadius:8,marginTop:4,padding:14,textAlign:"center",fontSize:12,color:"#9E958C",zIndex:50}}>кІҖмғү мӨ‘...</div>}
          {results.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #E8E2DA",borderRadius:8,marginTop:4,maxHeight:320,overflowY:"auto",zIndex:50,boxShadow:"0 8px 32px rgba(0,0,0,0.08)"}}>
              {results.map((r,i)=>(
                <div key={i} onClick={()=>addStock(r.symbol,r.name,r.code)}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",cursor:"pointer",borderBottom:"1px solid #F0EDE8",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#FAF8F5"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontFamily:"'DM Mono'",fontSize:11,color:"#A0785A",fontWeight:600,background:"rgba(160,120,90,0.08)",padding:"2px 7px",borderRadius:3}}>{r.code}</span>
                    <span style={{fontSize:13,color:"#1A1A1A",fontWeight:500}}>{r.name}</span>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#9E958C"}}>{r.sector}</span>
                    <span style={{fontSize:9,color:r.market==="KOSDAQ"?"#A0785A":"#5C7A5E",background:r.market==="KOSDAQ"?"rgba(160,120,90,0.08)":"rgba(92,122,94,0.08)",padding:"2px 6px",borderRadius:3,fontWeight:600}}>{r.market}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* м„ нғқлҗң мў…лӘ© нғңк·ё */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",flex:1}}>
          {stocks.map(s=>(
            <div key={s.symbol} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",background:s.color+"12",border:`1px solid ${s.color}40`,borderRadius:20,fontSize:12,color:s.color,fontWeight:600}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:s.color}}/>
              {s.name}
              <span onClick={()=>removeStock(s.symbol)} style={{cursor:"pointer",fontSize:14,marginLeft:2,color:s.color+"90"}}>вң•</span>
            </div>
          ))}
          {stocks.length>0&&<span style={{fontSize:10,color:"#9E958C"}}>мөңлҢҖ 6к°ң</span>}
        </div>
      </div>

      {error&&<div style={{background:"rgba(139,64,73,0.06)",border:"1px solid rgba(139,64,73,0.2)",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#8B4049"}}>{error}</div>}
      {loading&&<div style={{textAlign:"center",padding:40,color:"#A0785A",fontSize:13}}>лҚ°мқҙн„° лЎңл”© мӨ‘...</div>}

      {stocks.length>0&&(
        <div style={{animation:"fadeIn 0.3s ease"}}>
          {/* кё°к°„ м„ нғқ */}
          <div style={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:12,padding:"16px 24px",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:"#9E958C",fontWeight:500}}>кё°к°„</span>
                <input type="date" value={st.startDate} onChange={e=>set("startDate",e.target.value)}
                  style={{padding:"6px 10px",border:"1px solid #D6CEC4",borderRadius:6,fontSize:12,fontFamily:"'DM Mono'",color:"#1A1A1A",outline:"none"}}/>
                <span style={{color:"#9E958C"}}>~</span>
                <input type="date" value={st.endDate} onChange={e=>set("endDate",e.target.value)}
                  style={{padding:"6px 10px",border:"1px solid #D6CEC4",borderRadius:6,fontSize:12,fontFamily:"'DM Mono'",color:"#1A1A1A",outline:"none"}}/>
              </div>
              <div style={{display:"flex",gap:4}}>
                {presets.map(p=><button key={p.label} className="gb" onClick={p.fn}>{p.label}</button>)}
              </div>
              <div style={{marginLeft:"auto",display:"flex",gap:4}}>
                <button className={`gb ${st.chartMode==="price"?"on":""}`} onClick={()=>set("chartMode","price")}>к°ҖкІ©</button>
                <button className={`gb ${st.chartMode==="percent"?"on":""}`} onClick={()=>set("chartMode","percent")}>мҲҳмқөлҘ  %</button>
              </div>
            </div>
          </div>

          {/* л№„көҗ м°ЁнҠё */}
          {chartData.length>0&&(
            <div style={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
              <div style={{fontSize:15,fontWeight:700,color:"#1A1A1A",marginBottom:14}}>
                {stocks.length>1?"мў…лӘ© л№„көҗ м°ЁнҠё":"мЈјк°Җ м°ЁнҠё"}
                {st.chartMode==="percent"&&<span style={{fontSize:11,color:"#9E958C",fontWeight:400,marginLeft:8}}>мҲҳмқөлҘ  кё°мӨҖ (мӢңмһ‘мқј=0%)</span>}
              </div>
              <ResponsiveContainer width="100%" height={400}>
                <LineChart data={chartData} margin={{top:5,right:10,bottom:5,left:10}}>
                  <CartesianGrid stroke="rgba(26,35,50,0.06)"/>
                  <XAxis dataKey="date" tick={{fill:"#9E958C",fontSize:10,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={{stroke:"rgba(26,26,26,0.1)"}} interval={Math.max(0,Math.floor(chartData.length/8))}
                    tickFormatter={d=>{const[y,m]=d.split("-");return`${y.slice(2)}.${m}`;}}/>
                  <YAxis tick={{fill:"#9E958C",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false} domain={["auto","auto"]}
                    tickFormatter={st.chartMode==="percent"?v=>`${v.toFixed(0)}%`:v=>v>=10000?`${(v/10000).toFixed(0)}л§Ң`:fmtNum(v)}/>
                  <Tooltip contentStyle={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:12}} labelStyle={{color:"#7A7067"}}
                    formatter={(v,name)=>{const s=stocks.find(s=>s.symbol===name);return st.chartMode==="percent"?[`${v>=0?"+":""}${v.toFixed(2)}%`,s?.name||name]:[fmtKRW(v),s?.name||name];}}/>
                  {st.chartMode==="percent"&&<ReferenceLine y={0} stroke="rgba(26,26,26,0.15)" strokeDasharray="4 4"/>}
                  {filteredStocks.map(s=><Line key={s.symbol} type="monotone" dataKey={s.symbol} stroke={s.color} strokeWidth={2} dot={false} connectNulls/>)}
                </LineChart>
              </ResponsiveContainer>
            </div>
          )}

          {/* мў…лӘ©лі„ м№ҙл“ң */}
          {filteredStocks.map(s=>{
            const ret=calcReturns(s.filtered);
            return(
              <div key={s.symbol} style={{background:"#fff",border:`1px solid ${s.color}30`,borderLeft:`4px solid ${s.color}`,borderRadius:12,padding:"20px 24px",marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:12}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontFamily:"'DM Mono'",fontSize:11,color:s.color,background:s.color+"12",padding:"2px 8px",borderRadius:3,fontWeight:600}}>{s.code}</span>
                      <span style={{fontSize:16,fontWeight:700,color:"#1A1A1A"}}>{s.name}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    {s.quote?.price!=null&&(
                      <>
                        <div style={{fontFamily:"'DM Mono'",fontSize:24,color:"#1A1A1A",fontWeight:700}}>{fmtNum(s.quote.price)}<span style={{fontSize:12,color:"#9E958C",fontWeight:400,marginLeft:3}}>мӣҗ</span></div>
                        <div style={{fontFamily:"'DM Mono'",fontSize:12,color:retColor(s.quote.change)}}>
                          {s.quote.change!=null&&`${s.quote.change>0?"+":""}${fmtNum(s.quote.change)}`}
                          {s.quote.changePercent!=null&&` (${s.quote.changePercent>0?"+":""}${(s.quote.changePercent*100).toFixed(2)}%)`}
                        </div>
                      </>
                    )}
                  </div>
                </div>
                {/* кё°ліё м •ліҙ */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8,marginBottom:14}}>
                  {[
                    {label:"мӢңк°Җ",value:fmtKRW(s.quote?.open)},
                    {label:"кі к°Җ",value:fmtKRW(s.quote?.high)},
                    {label:"м Җк°Җ",value:fmtKRW(s.quote?.low)},
                    {label:"м „мқјмў…к°Җ",value:fmtKRW(s.quote?.prevClose)},
                    {label:"кұ°лһҳлҹү",value:s.quote?.volume?fmtBig(s.quote.volume)+"мЈј":"вҖ”"},
                    {label:"52мЈј мөңкі ",value:fmtKRW(s.quote?.week52High)},
                    {label:"52мЈј мөңм Җ",value:fmtKRW(s.quote?.week52Low)},
                  ].map((item,i)=>(
                    <div key={i} style={{background:"#FAF8F5",borderRadius:6,padding:"8px 10px"}}>
                      <div style={{fontSize:9,color:"#9E958C",marginBottom:3}}>{item.label}</div>
                      <div style={{fontFamily:"'DM Mono'",fontSize:12,color:"#2D2926",fontWeight:500}}>{item.value}</div>
                    </div>
                  ))}
                </div>
                {/* кё°к°„лі„ мҲҳмқөлҘ  */}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[
                    {label:"1мқј",value:ret.d1},{label:"1мЈј",value:ret.w1},{label:"1к°ңмӣ”",value:ret.m1},
                    {label:"3к°ңмӣ”",value:ret.m3},{label:"6к°ңмӣ”",value:ret.m6},{label:"1л…„",value:ret.y1},
                    {label:"м„ нғқкё°к°„",value:ret.period},
                  ].map((item,i)=>(
                    <div key={i} style={{background:"#FAF8F5",borderRadius:6,padding:"6px 10px",textAlign:"center",minWidth:70}}>
                      <div style={{fontSize:9,color:"#9E958C",marginBottom:3}}>{item.label}</div>
                      <div style={{fontFamily:"'DM Mono'",fontSize:13,fontWeight:600,color:retColor(item.value)}}>{retFmt(item.value)}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {!loading&&stocks.length===0&&!error&&(
        <div style={{textAlign:"center",padding:"80px 20px",color:"#9E958C"}}>
          <div style={{fontSize:40,marginBottom:16}}>рҹҮ°рҹҮ·</div>
          <div style={{fontSize:16,fontWeight:600,color:"#7A7067",marginBottom:10}}>н•ңкөӯ мў…лӘ©мқ„ кІҖмғүн•ҙліҙм„ёмҡ”</div>
          <div style={{fontSize:12,lineHeight:2,maxWidth:400,margin:"0 auto"}}>
            мў…лӘ©мқ„ кІҖмғүн•ҳкі  м„ нғқн•ҳл©ҙ м°ЁнҠёмҷҖ л¶„м„қмқҙ н‘ңмӢңлҗ©лӢҲлӢӨ.<br/>
            <strong style={{color:"#A0785A"}}>мөңлҢҖ 6к°ң</strong>к№Ңм§Җ м¶”к°Җн•ҳм—¬ л№„көҗн•  мҲҳ мһҲмҠөлӢҲлӢӨ.<br/>
            лӢ¬л ҘмңјлЎң мӣҗн•ҳлҠ” кё°к°„мқ„ м„Өм •н•ҳкі , к°ҖкІ©/мҲҳмқөлҘ  лӘЁл“ңлҘј м „нҷҳн•ҙліҙм„ёмҡ”.<br/>
            <span style={{color:"#A0785A",fontSize:11}}>KOSPI В· KOSDAQ В· ETF м§Җмӣҗ</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MAIN
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function App(){
  const[loaded,setLoaded]=useState(false);
  const[loadError,setLoadError]=useState(null);
  const[dataMeta,setDataMeta]=useState(null);
  const[activeTab,setActiveTab]=useState("trend");

  // в”Җв”Җ нғӯлі„ мғҒнғң (нғӯ м „нҷҳн•ҙлҸ„ мң м§Җ) в”Җв”Җ
  const[stockState,setStockState]=useState({
    stocks:[],
    startDate:new Date(Date.now()-365*86400000).toISOString().split("T")[0],
    endDate:new Date().toISOString().split("T")[0],
    chartMode:"price",
  });
  const[trendState,setTrendState]=useState({
    mode:"single",timeframe:"1d",
    selected:null,history:[],loading:false,error:null,
    maShort:5,maLong:60,momPeriod:60,breakoutK:0.5,
    activeStrats:["maCross","maAlign","minervini","rs","momentum"],
    conditionMode:"score",minScore:3,initAmt:10000000,
    screenerLoading:false,screenerResults:null,
  });
  const[corrState,setCorrState]=useState({
    data:null,loaded:false,loading:false,
    dualA:"kospi",dualB:"sp500",
  });

  const[selRegion,setSelRegion]=useState("US");
  const[selModels,setSelModels]=useState(["us_allweather","us_6040"]);
  const[rebal,setRebal]=useState("annual");
  const[startYM,setStartYM]=useState({year:1985,month:1});
  const[endYM,setEndYM]=useState({year:2026,month:5});
  const[cumGran,setCumGran]=useState("annual");
  const[cumUnit,setCumUnit]=useState("pct");
  const[contribGran,setContribGran]=useState("annual");
  const[focusModel,setFocusModel]=useState("us_allweather");
  const[focusIdx,setFocusIdx]=useState(null);
  const[fxMode,setFxMode]=useState("local");
  const[baseCcy,setBaseCcy]=useState("USD");
  const[initAmt,setInitAmt]=useState(100000000);
  const[initAmtStr,setInitAmtStr]=useState("100,000,000");
  const[showCustom,setShowCustom]=useState(false);
  const[customs,setCustoms]=useState([]);
  const[editId,setEditId]=useState(null);

  // в”Җв”Җ лҚ°мқҙн„° лЎңл“ң в”Җв”Җ
  useEffect(()=>{
    fetch("https://ab.david-choi2631.workers.dev/data.json")
      .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();})
      .then(json=>{
        const meta=json.meta;
        YRS=meta.years;
        DATA=json.data;
        DATA_END={year:meta.end_year,month:meta.end_month};
        setDataMeta(meta);
        setStartYM({year:meta.start_year,month:1});
        setEndYM({year:meta.end_year,month:meta.end_month});
        setLoaded(true);
      })
      .catch(err=>{
        console.error("data.json лЎңл“ң мӢӨнҢЁ:",err);
        setLoadError(err.message);
      });
  },[]);

  const maxYM=useMemo(()=>dataMeta?{year:dataMeta.end_year,month:dataMeta.end_month}:{year:2026,month:5},[dataMeta]);
  const regionModels=useMemo(()=>Object.entries(MODELS).filter(([_,m])=>m.region===selRegion),[selRegion]);
  const toggleModel=(k)=>{setSelModels(p=>{if(p.includes(k))return p.length>1?p.filter(x=>x!==k):p;if(p.length>=6)return p;return[...p,k];});setFocusModel(k);};
  const switchRegion=(r)=>{setSelRegion(r);const f=Object.entries(MODELS).filter(([_,m])=>m.region===r).map(([k])=>k);setSelModels(f.slice(0,2));setFocusModel(f[0]||"");};
  const handleInitAmt=(val)=>{const num=val.replace(/[^0-9]/g,"");setInitAmtStr(num?Number(num).toLocaleString("ko-KR"):"");setInitAmt(Number(num)||0);};
  const ccySym=baseCcy==="KRW"?"вӮ©":baseCcy==="JPY"?"ВҘ":"$";

  const addCustom=()=>{const id=Date.now().toString(36);const c={id,name:`м»ӨмҠӨн…Җ ${customs.length+1}`,alloc:{},active:false};setCustoms(p=>[...p,c]);setEditId(id);};
  const updateCustomField=(id,field,val)=>setCustoms(p=>p.map(c=>c.id===id?{...c,[field]:val}:c));
  const updateCustomAlloc=(id,asset,val)=>setCustoms(p=>p.map(c=>c.id===id?{...c,alloc:{...c.alloc,[asset]:val}}:c));
  const toggleCustomActive=(id)=>{setCustoms(p=>p.map(c=>c.id===id?{...c,active:!c.active}:c));const c=customs.find(x=>x.id===id);if(c&&!c.active)setFocusModel("__c_"+id);};
  const removeCustom=(id)=>setCustoms(p=>p.filter(c=>c.id!==id));
  const customTotal=(alloc)=>Object.values(alloc).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const customValid=(alloc)=>Math.abs(customTotal(alloc)-100)<0.01&&customTotal(alloc)>0;

  const combos=useMemo(()=>{
    if(!loaded)return[];
    const arr=selModels.map(m=>{const r=runBacktest(MODELS[m].alloc,startYM,endYM,rebal,cumGran,fxMode,baseCcy,initAmt);if(!r?.length)return null;const mk=MODELS[m];return{key:m,label:`${mk.name} (${REGIONS[mk.region]?.split(" ")[0]})`,color:mk.color,results:r,stats:stats(r,initAmt),alloc:mk.alloc};}).filter(Boolean);
    customs.filter(c=>c.active&&customValid(c.alloc)).forEach((c,i)=>{
      const cAlloc={};Object.entries(c.alloc).forEach(([k,v])=>{const n=parseFloat(v);if(n>0)cAlloc[k]=n;});
      const r=runBacktest(cAlloc,startYM,endYM,rebal,cumGran,fxMode,baseCcy,initAmt);
      if(r?.length)arr.push({key:"__c_"+c.id,label:c.name,color:CUSTOM_COLORS[i%CUSTOM_COLORS.length],results:r,stats:stats(r,initAmt),alloc:cAlloc});
    });
    return arr;
  },[loaded,selModels,rebal,startYM,endYM,cumGran,fxMode,baseCcy,initAmt,customs]);

  const cumData=useMemo(()=>{if(!combos.length)return[];const ml=Math.max(...combos.map(c=>c.results.length));return Array.from({length:ml},(_,i)=>{const pt={label:combos[0].results[i]?.label||""};combos.forEach(c=>{const v=c.results[i]?.cumulative;pt[c.key+"_pct"]=v?((v/initAmt-1)*100):null;pt[c.key+"_amt"]=v||null;});return pt;});},[combos,initAmt]);
  const annualData=useMemo(()=>{if(!combos.length)return[];const ay=[...new Set(combos.flatMap(c=>c.results.map(r=>r.year)))].sort();return ay.map(y=>{const pt={year:y};combos.forEach(c=>{const yrs=c.results.filter(r=>r.year===y);const a=yrs.reduce((cum,r)=>cum*(1+r.return/100),1)-1;pt[c.key]=parseFloat((a*100).toFixed(1));});return pt;});},[combos]);

  const focusAlloc=useMemo(()=>{
    if(focusModel.startsWith("__c_")){const id=focusModel.slice(4);const c=customs.find(x=>x.id===id);if(!c)return{};const a={};Object.entries(c.alloc).forEach(([k,v])=>{const n=parseFloat(v);if(n>0)a[k]=n;});return a;}
    return MODELS[focusModel]?.alloc||{};
  },[focusModel,customs]);
  const focusLabel=focusModel.startsWith("__c_")?(customs.find(c=>c.id===focusModel.slice(4))?.name||"м»ӨмҠӨн…Җ"):(MODELS[focusModel]?.name||"");
  const contribResults=useMemo(()=>loaded?runBacktest(focusAlloc,startYM,endYM,rebal,contribGran,fxMode,baseCcy,initAmt):null,[loaded,focusAlloc,startYM,endYM,rebal,contribGran,fxMode,baseCcy,initAmt]);
  const contribData=useMemo(()=>{if(!contribResults)return[];return contribResults.map(r=>{const pt={label:r.label};Object.keys(focusAlloc).forEach(a=>{pt[a]=parseFloat((r.contributions[a]||0).toFixed(2));});return pt;});},[contribResults,focusAlloc]);
  const focusDetail=focusIdx!==null&&contribResults?.[focusIdx]||null;

  const fmtAmt=(v)=>{if(baseCcy==="KRW"){if(Math.abs(v)>=1e8)return`${ccySym}${(v/1e8).toFixed(1)}м–ө`;if(Math.abs(v)>=1e4)return`${ccySym}${(v/1e4).toFixed(0)}л§Ң`;return`${ccySym}${Math.round(v).toLocaleString()}`;}if(Math.abs(v)>=1e6)return`${ccySym}${(v/1e6).toFixed(2)}M`;return`${ccySym}${Math.round(v).toLocaleString()}`;};
  const fmtPct=(v)=>`${v>=0?"+":""}${v.toFixed(1)}%`;
  const tI=(d)=>{const l=d.length;return l>200?23:l>80?7:l>30?3:Math.max(0,Math.floor(l/12));};

  // в”Җв”Җ лЎңл“ң м—җлҹ¬ в”Җв”Җ
  if(loadError)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,padding:40}}>
      <div style={{fontSize:48}}>вҡ пёҸ</div>
      <div style={{fontSize:16,color:"#8B4049",fontWeight:600}}>data.json лЎңл“ң мӢӨнҢЁ</div>
      <div style={{fontSize:13,color:"#7A7067",textAlign:"center",maxWidth:500,lineHeight:1.8}}>
        <code style={{background:"#FAF8F5",padding:"2px 8px",borderRadius:4}}>{loadError}</code>
        <br/><br/>
        <strong>н•ҙкІ° л°©лІ•:</strong><br/>
        1. <code>python fetch_data.py</code> мӢӨн–үн•ҳм—¬ data.json мғқм„ұ<br/>
        2. index.htmlкіј к°ҷмқҖ нҸҙлҚ”м—җ data.json л°°м№ҳ<br/>
        3. Cloudflare Pagesм—җ н•Ёк»ҳ л°°нҸ¬
      </div>
    </div>
  );

  // в”Җв”Җ лЎңл”© в”Җв”Җ
  if(!loaded)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{fontSize:13,color:"#A0785A",letterSpacing:2}}>лҚ°мқҙн„° лЎңл”© мӨ‘...</div>
    </div>
  );

  return(
    <div style={S.page}><style>{`
      @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
      *{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(26,26,26,0.2);border-radius:2px}
      .cb{transition:all .2s;border:1px solid #D6CEC4;background:#fff;color:#7A7067;font-size:13px;padding:8px 16px;border-radius:3px;font-family:'Noto Sans KR',sans-serif;font-weight:500}
      .cb:hover{background:#F5F0EB;color:#1A1A1A;border-color:#A0785A}.cb.on{border-color:var(--ac);color:var(--ac);background:var(--ac-bg)}
      .rb{transition:all .2s;border:1px solid #D6CEC4;background:#fff;color:#7A7067;font-size:12px;padding:7px 12px;border-radius:3px;font-family:'Noto Sans KR',sans-serif;font-weight:500}
      .rb:hover{background:#F5F0EB;color:#1A1A1A}.rb.on{border-color:#1A1A1A;color:#1A1A1A;background:rgba(26,26,26,0.05)}
      .gb{transition:all .2s;border:1px solid #D6CEC4;background:#fff;color:#7A7067;font-size:11px;padding:5px 10px;border-radius:2px;font-family:'DM Mono',monospace}
      .gb:hover{background:#F5F0EB;color:#1A1A1A}.gb.on{border-color:#A0785A;color:#A0785A;background:rgba(160,120,90,0.06)}
      .rg{transition:all .2s;border:1px solid #D6CEC4;background:#fff;color:#7A7067;font-size:13px;padding:8px 18px;border-radius:3px;font-family:'Noto Sans KR',sans-serif;font-weight:500}
      .rg:hover{background:#F5F0EB;color:#1A1A1A}.rg.on{border-color:#1A1A1A;color:#1A1A1A;background:rgba(26,26,26,0.04)}
      .fx{transition:all .2s;border:1px solid #D6CEC4;background:#fff;color:#7A7067;font-size:11px;padding:6px 10px;border-radius:2px;font-family:'Noto Sans KR',sans-serif}
      .fx:hover{background:#F5F0EB;color:#1A1A1A}.fx.on{border-color:#A0785A;color:#A0785A;background:rgba(160,120,90,0.06)}
      input:focus{outline:none;border-color:#A0785A !important;box-shadow:0 0 0 2px rgba(160,120,90,0.12)}
      input[type=number]::-webkit-inner-spin-button{opacity:1}
    `}</style>

    <header style={S.header}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={S.tag}>GLOBAL ASSET ALLOCATION BACKTEST ENGINE</div>
          <h1 style={S.title}>кёҖлЎңлІҢ мһҗмӮ°л°°л¶„ л°ұн…ҢмҠӨнҠё</h1>
          <p style={S.sub}>лҜёкөӯ В· н•ңкөӯ В· мқјліё вҖ” {dataMeta?.start_year}вҖ“{dataMeta?.end_year} | ETF Adjusted Price кё°л°ҳ мӢӨлҚ°мқҙн„°</p>
        </div>
        <DataBadge meta={dataMeta}/>
      </div>
      {/* в”Җв”Җ TAB NAV в”Җв”Җ */}
      <div style={{display:"flex",gap:0,marginTop:20,borderBottom:"none"}}>
        {[{key:"trend",label:"м¶”м„ём¶”мў…",icon:"рҹ“Ҡ"},{key:"stock",label:"н•ңкөӯ мў…лӘ© нғҗмғү",icon:"рҹҮ°рҹҮ·"},{key:"backtest",label:"мһҗмӮ°л°°л¶„ л°ұн…ҢмҠӨнҠё",icon:"вҡ–пёҸ"},{key:"corr",label:"мғҒкҙҖкҙҖкі„",icon:"рҹ”—"}].map(tab=>(
          <button key={tab.key} onClick={()=>setActiveTab(tab.key)}
            style={{padding:"10px 24px",fontSize:13,fontWeight:activeTab===tab.key?700:400,color:activeTab===tab.key?"#A0785A":"#9E958C",background:activeTab===tab.key?"#fff":"transparent",border:"1px solid "+(activeTab===tab.key?"#D6CEC4":"transparent"),borderBottom:activeTab===tab.key?"1px solid #fff":"1px solid #D6CEC4",borderRadius:"8px 8px 0 0",cursor:"pointer",fontFamily:"'Noto Sans KR'",marginBottom:-1,transition:"all 0.2s"}}>
            {tab.icon} {tab.label}
          </button>
        ))}
        <div style={{flex:1,borderBottom:"1px solid #D6CEC4",marginBottom:-1}}/>
      </div>
    </header>

    {/* в”Җв”Җ TREND FOLLOWING TAB в”Җв”Җ */}
    {activeTab==="trend"&&<TrendFollowing trendState={trendState} setTrendState={setTrendState}/>}

    {/* в”Җв”Җ STOCK EXPLORER TAB в”Җв”Җ */}
    {activeTab==="stock"&&<StockExplorer stockState={stockState} setStockState={setStockState}/>}

    {/* в”Җв”Җ CORRELATION TAB в”Җв”Җ */}
    {activeTab==="corr"&&<CorrelationTab corrState={corrState} setCorrState={setCorrState}/>}

    {/* в”Җв”Җ BACKTEST TAB в”Җв”Җ */}
    {activeTab==="backtest"&&(<>
    <div style={S.controls}>
      <div style={S.cg}><div style={S.cl}>м§Җм—ӯ</div><div style={S.cr}>{Object.entries(REGIONS).map(([k,v])=><button key={k} className={`rg ${selRegion===k?"on":""}`} onClick={()=>switchRegion(k)}>{v}</button>)}</div></div>
      <div style={S.cg}><div style={S.cl}>лӘЁлҚё (мөңлҢҖ 6)</div><div style={S.cr}>{regionModels.map(([k,m])=><button key={k} className={`cb ${selModels.includes(k)?"on":""}`} style={{"--ac":m.color,"--ac-bg":m.color+"15"}} onClick={()=>toggleModel(k)}><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:m.color,marginRight:6}}/>{m.name}</button>)}</div></div>
      <div style={S.cg}><div style={S.cl}>лҰ¬л°ёлҹ°мӢұ</div><div style={S.cr}>{REBAL_OPTIONS.map(r=><button key={r.key} className={`rb ${rebal===r.key?"on":""}`} onClick={()=>setRebal(r.key)}>{r.label}</button>)}</div></div>
    </div>
    <div style={{...S.controls,borderTop:"none",paddingTop:0}}>
      <div style={S.cg}><div style={S.cl}>кё°к°„</div><div style={{display:"flex",alignItems:"center",gap:8}}>
        <MonthPicker value={startYM} onChange={(v)=>{setStartYM(v);if(v.year>endYM.year||(v.year===endYM.year&&v.month>endYM.month))setEndYM(v);}} maxYM={maxYM} />
        <span style={{color:"#9E958C"}}>~</span>
        <MonthPicker value={endYM} onChange={setEndYM} minYM={startYM} maxYM={maxYM} />
      </div></div>
      <div style={S.cg}><div style={S.cl}>нҷҳмңЁ</div><div style={S.cr}>{FX_MODES.map(f=><button key={f.key} className={`fx ${fxMode===f.key?"on":""}`} onClick={()=>setFxMode(f.key)}>{f.label}</button>)}</div></div>
      {fxMode!=="local"&&<div style={S.cg}><div style={S.cl}>кё°мӨҖ нҶөнҷ”</div><div style={S.cr}>{BASE_CCYS.map(c=><button key={c.key} className={`fx ${baseCcy===c.key?"on":""}`} onClick={()=>setBaseCcy(c.key)}>{c.label}</button>)}</div></div>}
      <div style={S.cg}><div style={S.cl}>мҙҲкё° нҲ¬мһҗкёҲ</div><div style={{position:"relative",display:"flex",alignItems:"center"}}><input type="text" value={initAmtStr} onChange={e=>handleInitAmt(e.target.value)} style={{...S.sel,width:180,paddingRight:30}}/><span style={{position:"absolute",right:10,color:"#9E958C",fontSize:11,pointerEvents:"none"}}>{baseCcy==="KRW"?"мӣҗ":baseCcy==="JPY"?"ВҘ":"$"}</span></div></div>
    </div>

    {/* в”Җв”Җ CUSTOM BUILDER в”Җв”Җ */}
    <div style={{padding:"0 48px",borderBottom:"1px solid #E8E2DA"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setShowCustom(!showCustom)} style={{background:"none",border:"none",color:"#5C7A5E",fontSize:13,fontWeight:600,cursor:"pointer",padding:"14px 0",fontFamily:"'Noto Sans KR'"}}>
          <span style={{fontSize:14,marginRight:6}}>{showCustom?"в–ј":"в–¶"}</span>л§һм¶Ө нҸ¬нҠёнҸҙлҰ¬мҳӨ л№ҢлҚ”
        </button>
        {customs.filter(c=>c.active).length>0&&<span style={{fontSize:11,color:"#5C7A5E",fontFamily:"'DM Mono'"}}>{customs.filter(c=>c.active).length}к°ң нҷңм„ұ</span>}
      </div>
      {showCustom&&(
        <div style={{paddingBottom:20,animation:"fadeIn 0.2s ease"}}>
          {customs.map((c,ci)=>{const tot=customTotal(c.alloc);const valid=customValid(c.alloc);const isEdit=editId===c.id;const col=CUSTOM_COLORS[ci%CUSTOM_COLORS.length];return(
            <div key={c.id} style={{marginBottom:12,border:`1px solid ${c.active?col+"40":"#E8E2DA"}`,borderRadius:10,padding:14,background:c.active?col+"08":"#FAF8F5"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isEdit?12:0}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>
                <input type="text" value={c.name} onChange={e=>updateCustomField(c.id,"name",e.target.value)} style={{background:"transparent",border:"none",color:"#1A1A1A",fontSize:14,fontWeight:600,fontFamily:"'Noto Sans KR'",flex:1,outline:"none"}}/>
                <span style={{fontFamily:"'DM Mono'",fontSize:12,color:valid?"#5C7A5E":tot>100?"#8B4049":"#A0785A"}}>{tot.toFixed(1)}%{valid?" вң“":""}</span>
                <button onClick={()=>setEditId(isEdit?null:c.id)} style={{background:"none",border:"1px solid #E8E2DA",borderRadius:4,color:"#7A7067",fontSize:11,padding:"4px 8px",cursor:"pointer"}}>{isEdit?"м ‘кё°":"нҺём§‘"}</button>
                <button onClick={()=>{if(valid)toggleCustomActive(c.id);}} style={{background:c.active?col:"#fff",border:`1px solid ${c.active?col:"#D6CEC4"}`,borderRadius:4,color:c.active?"#fff":"#7A7067",fontSize:11,fontWeight:600,padding:"4px 10px",cursor:valid?"pointer":"not-allowed",opacity:valid?1:0.4}}>{c.active?"ON":"OFF"}</button>
                <button onClick={()=>removeCustom(c.id)} style={{background:"none",border:"none",color:"#8B4049",fontSize:14,cursor:"pointer",padding:"2px 6px"}}>вң•</button>
              </div>
              {isEdit&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:4}}>
                  {Object.entries(ASSETS).filter(([k])=>!k.startsWith("fx_")).map(([key,asset])=>(
                    <div key={key} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 8px",background:parseFloat(c.alloc[key])>0?col+"10":"#fff",border:`1px solid ${parseFloat(c.alloc[key])>0?col+"30":"#E8E2DA"}`,borderRadius:5}}>
                      <span style={{width:7,height:7,borderRadius:2,background:AC[key]||"#888",flexShrink:0}}/>
                      <span style={{flex:1,fontSize:10,color:"#4A4440"}}>{asset.short}</span>
                      <input type="number" min="0" max="100" step="0.5" value={c.alloc[key]||""} placeholder="0" onChange={e=>updateCustomAlloc(c.id,key,e.target.value)}
                        style={{width:48,padding:"3px 5px",background:"#FAF8F5",border:"1px solid #E8E2DA",borderRadius:3,color:col,fontSize:11,fontFamily:"'DM Mono'",textAlign:"right",outline:"none"}}/>
                      <span style={{fontSize:9,color:"#9E958C"}}>%</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );})}
          <button onClick={addCustom} style={{padding:"8px 18px",background:"rgba(92,122,94,0.06)",border:"1px solid rgba(92,122,94,0.25)",borderRadius:6,color:"#5C7A5E",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans KR'"}}>+ мғҲ нҸ¬нҠёнҸҙлҰ¬мҳӨ м¶”к°Җ</button>
        </div>
      )}
    </div>

    {!combos.length?<div style={{textAlign:"center",padding:60,color:"#9E958C"}}>лӘЁлҚёмқ„ м„ нғқн•ҳкұ°лӮҳ м»ӨмҠӨн…Җ нҸ¬нҠёнҸҙлҰ¬мҳӨлҘј нҷңм„ұнҷ”н•ҙмЈјм„ёмҡ”</div>:(<>

    {/* в”Җв”Җ SUMMARY в”Җв”Җ */}
    <div style={{display:"flex",gap:10,padding:"20px 48px",flexWrap:"wrap",borderBottom:"1px solid #E8E2DA"}}>
      {combos.map(c=>(<div key={c.key} style={{flex:"1 1 200px",background:"#fff",border:`1px solid ${c.color}25`,borderLeft:`3px solid ${c.color}`,borderRadius:8,padding:"14px 16px",minWidth:190}}>
        <div style={{fontSize:12,color:c.color,fontWeight:600,marginBottom:6}}>{c.label}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 14px",fontSize:11}}>
          <div><span style={{color:"#9E958C"}}>CAGR</span><div style={{fontFamily:"'DM Mono'",color:"#A0785A",fontSize:15,fontWeight:500}}>{c.stats.cagr}%</div></div>
          <div><span style={{color:"#9E958C"}}>мҙқ мҲҳмқөлҘ </span><div style={{fontFamily:"'DM Mono'",color:"#2D2926",fontSize:13}}>{c.stats.totalReturn}%</div></div>
          <div><span style={{color:"#9E958C"}}>ліҖлҸҷм„ұ</span><div style={{fontFamily:"'DM Mono'",color:"#7A7067"}}>{c.stats.volatility}%</div></div>
          <div><span style={{color:"#9E958C"}}>мғӨн”„</span><div style={{fontFamily:"'DM Mono'",color:parseFloat(c.stats.sharpe)>0.5?"#5C7A5E":"#A0785A"}}>{c.stats.sharpe}</div></div>
          <div><span style={{color:"#9E958C"}}>MDD</span><div style={{fontFamily:"'DM Mono'",color:"#8B4049"}}>-{c.stats.mdd}%</div></div>
          <div><span style={{color:"#9E958C"}}>мөңмў…</span><div style={{fontFamily:"'DM Mono'",color:"#2D2926",fontSize:12}}>{fmtAmt(c.stats.finalAmt)}</div></div>
        </div>
      </div>))}
    </div>

    {/* в”Җв”Җ CUMULATIVE в”Җв”Җ */}
    <div style={S.sec}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={S.secTitle}>лҲ„м Ғ мҲҳмқөлҘ </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{display:"flex",gap:4}}>{CUM_UNITS.map(u=><button key={u.key} className={`gb ${cumUnit===u.key?"on":""}`} onClick={()=>setCumUnit(u.key)}>{u.label}</button>)}</div>
          <div style={{display:"flex",gap:4}}>{Object.entries(GRAN).map(([k,v])=><button key={k} className={`gb ${cumGran===k?"on":""}`} onClick={()=>setCumGran(k)}>{v}</button>)}</div>
        </div>
      </div>
      <ResponsiveContainer width="100%" height={400}>
        <LineChart data={cumData} margin={{top:10,right:20,bottom:5,left:10}}>
          <CartesianGrid stroke="rgba(26,35,50,0.06)"/><XAxis dataKey="label" tick={{fill:"#9E958C",fontSize:10,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={{stroke:"rgba(26,26,26,0.1)"}} interval={tI(cumData)}/>
          <YAxis tick={{fill:"#9E958C",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false} tickFormatter={cumUnit==="pct"?v=>`${v.toFixed(0)}%`:v=>fmtAmt(v)}/>
          <Tooltip contentStyle={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:12}} labelStyle={{color:"#7A7067"}} formatter={(v,name)=>{const c=combos.find(c=>name.startsWith(c.key));return cumUnit==="pct"?[fmtPct(v),c?.label||name]:[fmtAmt(v),c?.label||name];}}/>
          <ReferenceLine y={0} stroke="rgba(26,26,26,0.08)" strokeDasharray="4 4"/>
          {combos.map(c=><Line key={c.key} type="monotone" dataKey={c.key+(cumUnit==="pct"?"_pct":"_amt")} stroke={c.color} strokeWidth={2} dot={false} connectNulls/>)}
        </LineChart>
      </ResponsiveContainer>
    </div>

    {/* в”Җв”Җ ANNUAL BAR в”Җв”Җ */}
    <div style={S.sec}>
      <div style={S.secTitle}>м—°лҸ„лі„ мҲҳмқөлҘ  (%)</div>
      <ResponsiveContainer width="100%" height={300}>
        <BarChart data={annualData} margin={{top:10,right:20,bottom:5,left:10}}>
          <CartesianGrid stroke="rgba(26,35,50,0.06)"/><XAxis dataKey="year" tick={{fill:"#9E958C",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={{stroke:"rgba(26,26,26,0.1)"}} interval={Math.max(0,Math.floor(annualData.length/15))}/>
          <YAxis tick={{fill:"#9E958C",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/><ReferenceLine y={0} stroke="rgba(26,26,26,0.1)"/>
          <Tooltip contentStyle={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:12}} labelStyle={{color:"#7A7067"}} formatter={(v,name)=>[`${v}%`,combos.find(c=>c.key===name)?.label||name]}/>
          {combos.map(c=><Bar key={c.key} dataKey={c.key} fill={c.color} opacity={0.8} radius={[2,2,0,0]}/>)}
        </BarChart>
      </ResponsiveContainer>
    </div>

    {/* в”Җв”Җ CONTRIBUTION в”Җв”Җ */}
    <div style={S.sec}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={S.secTitle}>мһҗмӮ°кө°лі„ кё°м—¬лҸ„ л¶„м„қ</div><div style={{fontSize:12,color:"#9E958C",marginTop:2}}>л°”лҘј нҒҙлҰӯн•ҳл©ҙ мғҒм„ё л¶„н•ҙлҘј ліј мҲҳ мһҲмҠөлӢҲлӢӨ</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{display:"flex",gap:4}}>{Object.entries(GRAN).map(([k,v])=><button key={k} className={`gb ${contribGran===k?"on":""}`} onClick={()=>{setContribGran(k);setFocusIdx(null);}}>{v}</button>)}</div>
          <select value={focusModel} onChange={e=>{setFocusModel(e.target.value);setFocusIdx(null);}} style={S.sel}>
            {selModels.map(k=>MODELS[k]?<option key={k} value={k}>{MODELS[k].name} ({REGIONS[MODELS[k].region]?.split(" ")[0]})</option>:null)}
            {customs.filter(c=>c.active&&customValid(c.alloc)).map(c=><option key={"__c_"+c.id} value={"__c_"+c.id}>{c.name}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"flex",gap:20,marginTop:8}}>
        <div style={{flex:1,minWidth:0}}>
          <ResponsiveContainer width="100%" height={340}>
            <BarChart data={contribData} stackOffset="sign" margin={{top:10,right:20,bottom:5,left:10}} onClick={e=>{if(e?.activeTooltipIndex!=null)setFocusIdx(e.activeTooltipIndex);}}>
              <CartesianGrid stroke="rgba(26,35,50,0.06)"/><XAxis dataKey="label" tick={{fill:"#9E958C",fontSize:contribGran==="monthly"?8:10,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={{stroke:"rgba(26,26,26,0.1)"}} interval={contribGran==="monthly"?11:contribGran==="quarterly"?3:Math.max(0,Math.floor(contribData.length/15))}/>
              <YAxis tick={{fill:"#9E958C",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/><ReferenceLine y={0} stroke="rgba(26,26,26,0.1)"/>
              <Tooltip contentStyle={{background:"#fff",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:12}} labelStyle={{color:"#7A7067"}} formatter={(v,name)=>[`${v}%`,ASSETS[name]?.short||name]}/>
              {Object.keys(focusAlloc).map(a=><Bar key={a} dataKey={a} stackId="stack" fill={AC[a]||"#888"} style={{cursor:"pointer"}}/>)}
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={S.dp}>{focusDetail?(
          <div style={{animation:"fadeIn 0.25s ease"}}>
            <div style={{fontSize:12,color:"#7A7067",marginBottom:4}}>мғҒм„ё л¶„н•ҙ</div>
            <div style={{fontFamily:"'DM Mono'",fontSize:24,color:"#A0785A",marginBottom:4}}>{focusDetail.label}</div>
            <div style={{fontSize:11,color:"#9E958C",marginBottom:14}}>{focusLabel}</div>
            {Object.entries(focusDetail.contributions).sort((a,b)=>b[1]-a[1]).map(([asset,contrib])=>(
              <div key={asset} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid #F0EDE8"}}>
                <span style={{width:8,height:8,borderRadius:2,background:AC[asset],flexShrink:0}}/><span style={{flex:1,fontSize:11,color:"#4A4440",lineHeight:1.3}}>{ASSETS[asset]?.short||asset}</span>
                <span style={{fontFamily:"'DM Mono'",fontSize:13,fontWeight:500,color:contrib>0?"#5C7A5E":contrib<0?"#8B4049":"#888",flexShrink:0}}>{contrib>0?"+":""}{contrib.toFixed(2)}%</span>
              </div>
            ))}
            <div style={{borderTop:"1px solid #E8E2DA",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:13,color:"#4A4440",fontWeight:700}}>н•©кі„</span>
              <span style={{fontFamily:"'DM Mono'",fontSize:14,fontWeight:700,color:focusDetail.return>0?"#5C7A5E":"#8B4049"}}>{focusDetail.return>0?"+":""}{focusDetail.return.toFixed(2)}%</span>
            </div>
          </div>
        ):<div style={{color:"#9E958C",fontSize:13,textAlign:"center",paddingTop:60}}>вҶҗ м°ЁнҠём—җм„ң л°”лҘј<br/>нҒҙлҰӯн•ҳм„ёмҡ”</div>}</div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:14,marginTop:14,padding:"12px 0",borderTop:"1px solid #F0EDE8"}}>
        {Object.keys(focusAlloc).map(a=>(<div key={a} style={{display:"flex",alignItems:"flex-start",gap:6}}><span style={{width:10,height:10,borderRadius:2,background:AC[a],marginTop:3,flexShrink:0}}/><div><div style={{fontSize:12,color:"#4A4440",fontWeight:500}}>{ASSETS[a]?.short} ({focusAlloc[a]}%)</div><div style={{fontSize:10,color:"#9E958C",marginTop:1}}>{ASSETS[a]?.full}</div></div></div>))}
      </div>
    </div>

    {/* в”Җв”Җ TABLE в”Җв”Җ */}
    <div style={S.sec}>
      <div style={S.secTitle}>м„ұкіј л№„көҗ н…Ңмқҙлё”</div>
      <div style={{overflowX:"auto",marginTop:14}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["лӘЁлҚё","CAGR","мҙқ мҲҳмқөлҘ ","ліҖлҸҷм„ұ","мғӨн”„","MDD","мөңмў… кёҲм•Ў","мөңкі мқҳ н•ҙ","мөңм•…мқҳ н•ҙ"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
        <tbody>{combos.map(c=>(<tr key={c.key} style={{borderBottom:"1px solid #F0EDE8"}}>
          <td style={S.td}><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:c.color,marginRight:8}}/><span style={{color:"#1A1A1A"}}>{c.label}</span></td>
          <td style={{...S.td,color:"#A0785A"}}>{c.stats.cagr}%</td><td style={S.td}>{c.stats.totalReturn}%</td><td style={S.td}>{c.stats.volatility}%</td>
          <td style={{...S.td,color:parseFloat(c.stats.sharpe)>0.5?"#5C7A5E":"#A0785A"}}>{c.stats.sharpe}</td>
          <td style={{...S.td,color:"#8B4049"}}>-{c.stats.mdd}%</td><td style={{...S.td,color:"#A0785A"}}>{fmtAmt(c.stats.finalAmt)}</td>
          <td style={{...S.td,color:"#5C7A5E",fontSize:12}}>{c.stats.bestYear}</td><td style={{...S.td,color:"#8B4049",fontSize:12}}>{c.stats.worstYear}</td>
        </tr>))}</tbody></table>
      </div>
    </div>

    <div style={{padding:"20px 48px 32px"}}><div style={{fontSize:11,color:"#9E958C",lineHeight:2}}>
      <strong style={{color:"#7A7067"}}>лҚ°мқҙн„° м¶ңмІҳ (ETF Adjusted Price via FinanceDataReader)</strong><br/>
      лҜёкөӯ: SPY (S&P 500) | TLT (20Y+мұ„к¶Ң) | IEF (7-10Yмұ„к¶Ң) | SHY (1-3Yмұ„к¶Ң) | TIP (TIPS) | VNQ (лҰ¬мё ) | BIL (T-Bill) | GLD (кёҲ) | GSG (мӣҗмһҗмһ¬)<br/>
      н•ңкөӯ: 069500 (KODEX 200) | 148070 (көӯкі мұ„10л…„) | 114260 (көӯкі мұ„3л…„) | 130730 (лӢЁкё°мһҗкёҲ)<br/>
      мқјліё: 1306.T (TOPIX) | 1343.T (J-REIT) | BOJ O/N Call Rate<br/>
      нҷҳмңЁ: USD/KRW В· USD/JPY (FinanceDataReader)
    </div><div style={{fontSize:11,color:"#9E958C",marginTop:6}}>
      вҖ» ETF Adjusted Close = л°°лӢ№ мһ¬нҲ¬мһҗ л°ҳмҳҒ Total Return | ETF лҜёмғҒмһҘ кё°к°„мқҖ мқёлҚұмҠӨ н•ҷмҲ лҚ°мқҙн„° нҸҙл°ұ<br/>
      вҖ» <code style={{fontSize:10,background:"#FAF8F5",padding:"1px 4px",borderRadius:2}}>python fetch_data.py</code> мӢӨн–үмңјлЎң data.json к°ұмӢ  | {dataMeta?.generated} кё°мӨҖ
    </div></div>
    </>)}
    </>)}
    {/* end backtest tab */}
    </div>
  );
}

const S={
  page:{fontFamily:"'Noto Sans KR',sans-serif",background:"#F5F0EB",color:"#1A1A1A",minHeight:"100vh",maxWidth:1440,margin:"0 auto"},
  header:{padding:"44px 48px 32px",borderBottom:"1px solid #D6CEC4",background:"#fff"},
  tag:{fontFamily:"'DM Mono'",fontSize:10,letterSpacing:4,color:"#A0785A",marginBottom:12,textTransform:"uppercase"},
  title:{fontFamily:"'Noto Sans KR',sans-serif",fontSize:28,color:"#1A1A1A",letterSpacing:-0.3,marginBottom:8,fontWeight:700},
  sub:{fontSize:13,color:"#9E958C",fontFamily:"'Noto Sans KR',sans-serif",letterSpacing:0.2},
  controls:{display:"flex",alignItems:"flex-end",gap:24,padding:"18px 48px",borderBottom:"1px solid #E8E2DA",flexWrap:"wrap",background:"#FAF8F5"},
  cg:{},cl:{fontSize:10,color:"#9E958C",marginBottom:6,letterSpacing:1,fontFamily:"'Noto Sans KR',sans-serif",textTransform:"uppercase",fontWeight:500},cr:{display:"flex",gap:5,flexWrap:"wrap"},
  sel:{padding:"7px 12px",background:"#fff",border:"1px solid #D6CEC4",borderRadius:3,color:"#1A1A1A",fontSize:13,fontFamily:"'DM Mono'",cursor:"pointer",outline:"none"},
  sec:{padding:"28px 48px",borderBottom:"1px solid #E8E2DA",background:"#fff"},
  secTitle:{fontSize:16,fontFamily:"'Noto Sans KR',sans-serif",color:"#1A1A1A",marginBottom:10,letterSpacing:0.2,fontWeight:700},
  dp:{width:280,flexShrink:0,background:"#FAF8F5",border:"1px solid #E8E2DA",borderRadius:6,padding:20,minHeight:300},
  th:{textAlign:"left",padding:"10px 14px",fontSize:10,color:"#9E958C",fontFamily:"'Noto Sans KR',sans-serif",letterSpacing:0.8,borderBottom:"2px solid #E8E2DA",whiteSpace:"nowrap",textTransform:"uppercase",fontWeight:500},
  td:{padding:"12px 14px",fontSize:13,color:"#4A4440",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
