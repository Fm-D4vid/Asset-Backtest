function MonthPicker({value,onChange,minYM,maxYM}){
  const[open,setOpen]=useState(false);
  const[viewYear,setViewYear]=useState(value.year);
  const ref=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const months=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const isD=(y,m)=>{if(maxYM&&(y>maxYM.year||(y===maxYM.year&&m>maxYM.month)))return true;if(minYM&&(y<minYM.year||(y===minYM.year&&m<minYM.month)))return true;return false;};
  const isSel=(y,m)=>value.year===y&&value.month===m;
  return(
    <div ref={ref} style={{position:"relative",display:"inline-block"}}>
      <button onClick={()=>{setViewYear(value.year);setOpen(!open);}} style={{padding:"7px 14px",background:"#161B22",border:"1px solid #E8E2DA",borderRadius:6,color:"#CDD9E5",fontSize:13,fontFamily:"'DM Mono'",cursor:"pointer",minWidth:110,textAlign:"left"}}>

function getFx(aCcy,bCcy,mode,yi){
  if(mode==="local"||aCcy===bCcy)return 0;
  let fx=0;
  if(aCcy==="USD"&&bCcy==="KRW")fx=DATA.fx_usdkrw[yi]||0;
  else if(aCcy==="USD"&&bCcy==="JPY")fx=DATA.fx_usdjpy[yi]||0;
  else if(aCcy==="KRW"&&bCcy==="USD")fx=-(DATA.fx_usdkrw[yi]||0);
  else if(aCcy==="KRW"&&bCcy==="JPY")fx=(DATA.fx_usdjpy[yi]||0)-(DATA.fx_usdkrw[yi]||0);
  else if(aCcy==="JPY"&&bCcy==="USD")fx=-(DATA.fx_usdjpy[yi]||0);
  else if(aCcy==="JPY"&&bCcy==="KRW")fx=(DATA.fx_usdkrw[yi]||0)-(DATA.fx_usdjpy[yi]||0);
  if(mode==="hedged"){const br=bCcy==="USD"?(DATA.us_cash[yi]||0):bCcy==="KRW"?(DATA.kr_cash[yi]||0):(DATA.jp_cash[yi]||0);const ar=aCcy==="USD"?(DATA.us_cash[yi]||0):aCcy==="KRW"?(DATA.kr_cash[yi]||0):(DATA.jp_cash[yi]||0);return-(br-ar)*0.8;}
  return fx;
}
function splitRet(a,n,s,noiseScale=0.05){const b=Math.pow(1+a/100,1/n)-1;const r=[];let rem=a/100;for(let i=0;i<n-1;i++){const hash=Math.abs(Math.sin(s*127.1+i*311.7))*43758.5453;const noise=1+((hash%1)*2-1)*noiseScale;const p=b*noise;r.push(p);rem=(1+rem)/(1+p)-1;}r.push(rem);return r;}

function runBacktest(alloc,sYM,eYM,rebal,gran,fxMode,bCcy,init){
  if(!alloc||!Object.keys(alloc).length||!YRS.length)return null;
  const assets=Object.keys(alloc);
  const drift=rebal==="monthly"?0:rebal==="quarterly"?0.002:0.005;
  const ppy=gran==="monthly"?12:gran==="quarterly"?4:1;
  const mL=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const qL=["Q1","Q2","Q3","Q4"];
  const si=YRS.indexOf(sYM.year),ei=YRS.indexOf(eYM.year);
  if(si<0||ei<0)return null;
  const results=[];let cum=init;
  for(let yi=si;yi<=ei;yi++){
    const year=YRS[yi];let maxP=ppy;
    if(year===DATA_END.year)maxP=gran==="monthly"?DATA_END.month:gran==="quarterly"?Math.ceil(DATA_END.month/3):1;
    let sp=0,ep=maxP-1;
    if(year===sYM.year&&gran==="monthly")sp=sYM.month-1;
    if(year===sYM.year&&gran==="quarterly")sp=Math.floor((sYM.month-1)/3);
    if(year===eYM.year&&gran==="monthly")ep=Math.min(eYM.month-1,maxP-1);
    if(year===eYM.year&&gran==="quarterly")ep=Math.min(Math.floor((eYM.month-1)/3),maxP-1);
    const aSub={};assets.forEach(a=>{const raw=DATA[a]?.[yi]||0;const fx=getFx(ASSETS[a]?.ccy||"USD",bCcy,fxMode,yi);const tot=raw+fx;aSub[a]=ppy===1?[tot/100]:splitRet(tot,ppy,tot+yi*3.7+a.charCodeAt(0));});
    for(let p=sp;p<=ep;p++){let pr=0;const contribs={};assets.forEach(a=>{const w=alloc[a]/100;const ar=aSub[a][p]||0;const adj=ar-drift*Math.abs(ar)/ppy;const c=w*adj;pr+=c;contribs[a]=c*100;});cum*=(1+pr);
      const label=ppy===1?`${year}`:gran==="quarterly"?`${year} ${qL[p]}`:`${year} ${mL[p]}`;
      results.push({label,year,period:p,return:pr*100,cumulative:cum,contributions:contribs});}
  }return results;
}
function stats(results,init){
  if(!results?.length)return null;
  const yM={};results.forEach(r=>{if(!yM[r.year])yM[r.year]=[];yM[r.year].push(r.return/100);});
  const aR=Object.entries(yM).map(([y,p])=>({year:+y,ret:p.reduce((c,r)=>c*(1+r),1)-1}));
  const n=aR.length,fin=results[results.length-1].cumulative;
  const tot=(fin/init-1)*100,cagr=n?(Math.pow(fin/init,1/n)-1)*100:0;
  const mean=aR.reduce((a,b)=>a+b.ret,0)/n;
  const vol=Math.sqrt(aR.reduce((a,b)=>a+Math.pow(b.ret-mean,2),0)/n)*100;
  const sharpe=vol?(cagr-4)/vol:0;
  let peak=init,mdd=0;results.forEach(r=>{if(r.cumulative>peak)peak=r.cumulative;const dd=(peak-r.cumulative)/peak;if(dd>mdd)mdd=dd;});
  const best=aR.reduce((a,b)=>b.ret>a.ret?b:a),worst=aR.reduce((a,b)=>b.ret<a.ret?b:a);
  return{totalReturn:tot.toFixed(1),cagr:cagr.toFixed(2),volatility:vol.toFixed(1),sharpe:sharpe.toFixed(2),mdd:(mdd*100).toFixed(1),bestYear:`${best.year} (${best.ret>0?"+":""}${(best.ret*100).toFixed(1)}%)`,worstYear:`${worst.year} (${(worst.ret*100).toFixed(1)}%)`,finalAmt:fin};
}

  {key:"rs",name:"RS 상대강도",desc:"미너비니 RS 점수 (쿼터별 가중 수익률 백분위 70+)",color:"#79C0FF"},

  {key:"momentum",name:"듀얼 모멘텀",desc:"N일 수익률이 양수이면 매수, 음수이면 현금",color:"#D29922"},
];

function TrendFollowing({trendState,setTrendState}){
  const st=trendState;
  const set=(k,v)=>setTrendState(p=>({...p,[k]:v}));
  const toggleStrat=(key)=>set("activeStrats",st.activeStrats.includes(key)?st.activeStrats.filter(k=>k!==key):[...st.activeStrats,key]);

  const[searchQ,setSearchQ]=useState("");
  const[searchResults,setSearchResults]=useState([]);
  const[kospiHist,setKospiHist]=useState(null);
  const searchRef=useRef(null);

  const doSearch=async(q)=>{if(!q)return setSearchResults([]);try{const r=await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(q)}&region=${st.region}`);const d=await r.json();setSearchResults(d.results||[]);}catch(e){}};
  const onSearchInput=(v)=>{setSearchQ(v);clearTimeout(searchRef.current);if(v.length>=1)searchRef.current=setTimeout(()=>doSearch(v),300);else setSearchResults([]);};

  const selectStock=async(symbol,name,code)=>{
    setSearchResults([]);setSearchQ(name+" ("+code+")");
    set("loading",true);set("error",null);set("selected",{symbol,name,code});
    try{
      const[hRes,kRes]=await Promise.all([
        fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(symbol)}&range=5y`).then(r=>r.json()),
        kospiHist?Promise.resolve(null):fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent("^KS11")}&range=5y`).then(r=>r.json())
      ]);
      set("history",hRes.history||[]);
      if(kRes)setKospiHist(kRes.history||[]);
    }catch(e){set("error","데이터를 불러올 수 없습니다.");}
    set("loading",false);
  };

  // ── 지표 계산 유틸 ──
  const calcMA=(data,period)=>data.map((d,i)=>i<period-1?null:data.slice(i-period+1,i+1).reduce((a,b)=>a+(b.adjClose||b.close),0)/period);
  const calcBB=(data,period=20,mult=2)=>{
    const ma=calcMA(data,period);
    return data.map((d,i)=>{
      if(ma[i]==null)return{upper:null,lower:null,mid:null};
      const slice=data.slice(i-period+1,i+1).map(x=>x.adjClose||x.close);
      const std=Math.sqrt(slice.reduce((a,v)=>a+Math.pow(v-ma[i],2),0)/period);
      return{upper:ma[i]+mult*std,lower:ma[i]-mult*std,mid:ma[i]};
    });
  };
  const calcRSRaw=(prices,i)=>{if(i<252)return null;const p=prices[i];return(p/(prices[i-63]||p))*0.4+(p/(prices[i-126]||p))*0.2+(p/(prices[i-189]||p))*0.2+(p/(prices[i-252]||p))*0.2;};
  const calcRSPercentile=(raw,all)=>{if(raw==null||!all.length)return null;const v=all.filter(s=>s!=null).sort((a,b)=>a-b);if(!v.length)return null;const idx=v.findIndex(s=>s>=raw);return Math.round(((idx<0?v.length:idx)/v.length)*99)+1;};

  // ── 전략 시그널 계산 ──
  const strategyAnalysis=useMemo(()=>{
    const hist=st.history;
    if(!hist||hist.length<200)return null;
    const prices=hist.map(d=>d.adjClose||d.close);
    const ma5=calcMA(hist,5),ma20=calcMA(hist,20),ma60=calcMA(hist,60),ma120=calcMA(hist,120),ma200=calcMA(hist,200);
    const ma150=calcMA(hist,150);
    const bb=calcBB(hist,20,2);

    // 일별 전략 시그널 (1=매수, 0=중립, -1=매도)
    const signals=hist.map((d,i)=>{
      const p=prices[i];
      const sig={date:d.date,price:p,scores:{}};

      // 1. MA 크로스
      const sMA=st.maShort===5?ma5:ma20;
      const lMA=st.maLong===60?ma60:st.maLong===120?ma120:ma200;
      if(sMA[i]!=null&&lMA[i]!=null)sig.scores.maCross=sMA[i]>lMA[i]?1:-1;

      // 2. MA 정배열
      if(ma5[i]&&ma20[i]&&ma60[i]&&ma120[i]&&ma200[i]){
        const aligned=ma5[i]>ma20[i]&&ma20[i]>ma60[i]&&ma60[i]>ma120[i]&&ma120[i]>ma200[i];
        const reverse=ma5[i]<ma20[i]&&ma20[i]<ma60[i]&&ma60[i]<ma120[i];
        sig.scores.maAlign=aligned?1:reverse?-1:0;
      }

      // 3. 미너비니 Trend Template
      if(ma150[i]&&ma200[i]&&i>=252){
        const w52=prices.slice(Math.max(0,i-252),i+1);
        const w52High=Math.max(...w52),w52Low=Math.min(...w52);
        const ma200rising=ma200[i]>(ma200[Math.max(0,i-20)]||0);
        const aboveMAs=p>ma150[i]&&ma150[i]>ma200[i];
        const fromLow=(p/w52Low-1)>=0.3;
        const fromHigh=(1-p/w52High)<=0.25;
        const pass=ma200rising&&aboveMAs&&fromLow&&fromHigh;
        sig.scores.minervini=pass?1:-1;
        sig.minerviniDetail={ma200rising,aboveMAs,fromLow:((p/w52Low-1)*100).toFixed(1),fromHigh:((1-p/w52High)*100).toFixed(1)};
      }

      // 4. RS 상대강도
      if(kospiHist&&i>=60){
        const kMap={};kospiHist.forEach(k=>{kMap[k.date]=k.adjClose||k.close;});
        const today=kMap[d.date],past60=kMap[hist[Math.max(0,i-60)]?.date];
        if(today&&past60){
          const stockRet=(p/prices[Math.max(0,i-60)]-1)*100;
          const kospiRet=(today/past60-1)*100;
          const rs=stockRet-kospiRet;
          sig.scores.rs=rs>0?1:rs<-5?-1:0;
          sig.rsValue=rs;
        }
      }

      // 5. 볼린저 밴드
      if(bb[i].upper!=null){
        sig.scores.bollinger=p>bb[i].upper?1:p<bb[i].lower?-1:0;
        sig.bbUpper=bb[i].upper;sig.bbLower=bb[i].lower;sig.bbMid=bb[i].mid;
      }

      // 6. 변동성 돌파
      if(i>0){
        const prev=hist[i-1];
        const prevRange=prev.high-prev.low;
        const target=(prev.adjClose||prev.close)+prevRange*st.breakoutK;
        sig.scores.breakout=d.high>=target?1:0;
        sig.breakoutTarget=target;
      }

      // 7. 듀얼 모멘텀
      if(i>=st.momPeriod){
        const ret=(p/prices[i-st.momPeriod]-1)*100;
        sig.scores.momentum=ret>0?1:-1;
        sig.momValue=ret;
      }

      // 종합 점수
      const active=st.activeStrats;
      const activeScores=active.map(k=>sig.scores[k]).filter(v=>v!=null);
      sig.totalScore=activeScores.reduce((a,b)=>a+Math.max(0,b),0);
      sig.maxScore=activeScores.length;
      sig.buySignal=st.conditionMode==="and"?activeScores.every(v=>v>=1):sig.totalScore>=st.minScore;
      return sig;
    });

    // ── 백테스트 ──
    let cash=st.initAmt,shares=0,position=false,buyPrice=0;
    const equity=[],trades=[];
    for(let i=200;i<signals.length;i++){
      const sig=signals[i];
      const p=sig.price;
      if(!position&&sig.buySignal){
        shares=Math.floor(cash/p);
        if(shares>0){buyPrice=p;cash-=shares*p;position=true;trades.push({type:"buy",date:sig.date,price:p,score:sig.totalScore});}
      }else if(position&&!sig.buySignal){
        cash+=shares*p;const ret=(p/buyPrice-1)*100;
        trades.push({type:"sell",date:sig.date,price:p,ret:ret.toFixed(1)});shares=0;position=false;
      }
      const totalValue=cash+(shares*p);
      equity.push({date:sig.date,value:totalValue,price:p,score:sig.totalScore,buy:sig.buySignal});
    }
    if(position)cash+=shares*signals[signals.length-1].price;
    const finalValue=cash;

    // 통계
    const buyTrades=trades.filter(t=>t.type==="sell");
    const wins=buyTrades.filter(t=>parseFloat(t.ret)>0).length;
    const totalReturn=(finalValue/st.initAmt-1)*100;
    const years=(signals.length-200)/252;
    const cagr=years>0?(Math.pow(finalValue/st.initAmt,1/years)-1)*100:0;
    let peak=st.initAmt,mdd=0;
    equity.forEach(e=>{if(e.value>peak)peak=e.value;const dd=(peak-e.value)/peak;if(dd>mdd)mdd=dd;});

    // 차트 데이터
    const step=Math.max(1,Math.floor(equity.length/300));
    const chartData=equity.filter((_,i)=>i%step===0||i===equity.length-1);

    // 현재 상태 대시보드
    const latest=signals[signals.length-1];

    return{signals,equity,chartData,trades,latest,
      stats:{totalReturn:totalReturn.toFixed(1),cagr:cagr.toFixed(2),mdd:(mdd*100).toFixed(1),
        trades:buyTrades.length,winRate:buyTrades.length?(wins/buyTrades.length*100).toFixed(1):"0",
        wins,losses:buyTrades.length-wins,finalValue:Math.round(finalValue)}};
  },[st.history,st.activeStrats,st.conditionMode,st.minScore,st.maShort,st.maLong,st.breakoutK,st.momPeriod,st.initAmt,kospiHist]);

  const fmtNum=(v)=>{if(v==null)return"—";return Number(v).toLocaleString("ko-KR");};
  const fmtKRW=(v)=>{if(v==null)return"—";return Number(v).toLocaleString("ko-KR")+"원";};
  const retColor=(v)=>v>0?"#3FB950":v<0?"#FF7B72":"#768390";

  // ── 타임프레임에 맞는 range 자동 결정 ──
  const intervalToRange=(iv)=>{
    if(iv==="1m"||iv==="2m")return"7d";
    if(iv==="5m"||iv==="15m"||iv==="30m")return"60d";
    if(iv==="60m"||iv==="90m"||iv==="1h")return"730d";
    if(iv==="1wk")return"5y";
    if(iv==="1mo")return"max";
    return"5y";
  };

  // ── 종목 선택 시 재로딩 (타임프레임 변경 반영) ──
  useEffect(()=>{
    if(!st.selected)return;
    const reload=async()=>{
      set("loading",true);
      try{
        const range=intervalToRange(st.timeframe);
        const[hRes,kRes]=await Promise.all([
          fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(st.selected.symbol)}&range=${range}&interval=${st.timeframe}`).then(r=>r.json()),
          fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent("^KS11")}&range=${range}&interval=${st.timeframe}`).then(r=>r.json())
        ]);
        set("history",hRes.history||[]);
        setKospiHist(kRes.history||[]);
      }catch(e){set("error","데이터 로딩 실패");}
      set("loading",false);
    };
    reload();
  },[st.timeframe]);

  // ── 스크리너: 전체 종목 일괄 분석 ──
  // runScreener removed — replaced by runScreenerWith above

  // 시그널 평가 함수 (단일 종목 최신 시점)
  const evaluateSignals=(hist,kHist,strats,allRSScores)=>{
    const activeS=strats||st.activeStrats;
    if(hist.length<200)return{signals:{},scores:{},totalScore:0,maxScore:0,buySignal:false,details:{}};
    const prices=hist.map(d=>d.adjClose||d.close);
    const ma5=calcMA(hist,5),ma20=calcMA(hist,20),ma60=calcMA(hist,60),ma120=calcMA(hist,120),ma200=calcMA(hist,200),ma150=calcMA(hist,150);
    const bb=calcBB(hist,20,2);
    const i=hist.length-1;
    const p=prices[i];
    const scores={};const details={};

    // MA 크로스
    const sMA=st.maShort===5?ma5:ma20;
    const lMA=st.maLong===60?ma60:st.maLong===120?ma120:ma200;
    if(sMA[i]!=null&&lMA[i]!=null)scores.maCross=sMA[i]>lMA[i]?1:-1;

    // MA 정배열
    if(ma5[i]&&ma20[i]&&ma60[i]&&ma120[i]&&ma200[i]){
      const aligned=ma5[i]>ma20[i]&&ma20[i]>ma60[i]&&ma60[i]>ma120[i]&&ma120[i]>ma200[i];
      scores.maAlign=aligned?1:0;
    }

    // 미너비니
    if(ma150[i]&&ma200[i]&&i>=252){
      const w52=prices.slice(Math.max(0,i-252),i+1);
      const w52High=Math.max(...w52),w52Low=Math.min(...w52);
      const ma200rising=ma200[i]>(ma200[Math.max(0,i-20)]||0);
      const aboveMAs=p>ma150[i]&&ma150[i]>ma200[i];
      const fromLow=(p/w52Low-1)>=0.3;
      const fromHigh=(1-p/w52High)<=0.25;
      scores.minervini=ma200rising&&aboveMAs&&fromLow&&fromHigh?1:0;
      details.fromHigh=((1-p/w52High)*100).toFixed(1);
      details.fromLow=((p/w52Low-1)*100).toFixed(1);
    }

    // RS (미너비니 쿼터별 가중 백분위)
    const rsRaw=calcRSRaw(prices,i);
    if(rsRaw!=null&&allRSScores&&allRSScores.length>0){
      const rsRank=calcRSPercentile(rsRaw,allRSScores);
      if(rsRank!=null){scores.rs=rsRank>=70?1:rsRank<=30?-1:0;details.rsRank=rsRank;details.rsRaw=rsRaw.toFixed(3);}
    } else if(kHist&&kHist.length>60&&i>=60){
      const kMap={};kHist.forEach(k=>{kMap[k.date]=k.adjClose||k.close;});
      const today=kMap[hist[i].date],past60=kMap[hist[Math.max(0,i-60)]?.date];
      if(today&&past60){
        const stockRet=(p/prices[Math.max(0,i-60)]-1)*100;
        const kospiRet=(today/past60-1)*100;
        const rs=stockRet-kospiRet;
        scores.rs=rs>0?1:rs<-5?-1:0;
        details.rs=rs.toFixed(1);
      }
    }

    // 볼린저
    if(bb[i].upper!=null)scores.bollinger=p>bb[i].upper?1:p<bb[i].lower?-1:0;

    // 변동성 돌파
    if(i>0){
      const prev=hist[i-1];
      const prevRange=prev.high-prev.low;
      const target=(prev.adjClose||prev.close)+prevRange*st.breakoutK;
      scores.breakout=hist[i].high>=target?1:0;
    }

    // 모멘텀
    if(i>=st.momPeriod){
      const ret=(p/prices[i-st.momPeriod]-1)*100;
      scores.momentum=ret>0?1:-1;
      details.momentum=ret.toFixed(1);
    }

    const active=activeS;
    const activeScores=active.map(k=>scores[k]).filter(v=>v!=null);
    const totalScore=activeScores.reduce((a,b)=>a+Math.max(0,b),0);
    const maxScore=activeScores.length;
    const buySignal=st.conditionMode==="and"?activeScores.every(v=>v>=1):totalScore>=st.minScore;
    return{signals:scores,scores,totalScore,maxScore,buySignal,details};
  };

  const TIMEFRAMES=[
    {key:"1m",label:"1분"},{key:"5m",label:"5분"},{key:"15m",label:"15분"},
    {key:"30m",label:"30분"},{key:"60m",label:"60분"},{key:"1d",label:"일봉"},
    {key:"1wk",label:"주봉"},{key:"1mo",label:"월봉"},
  ];

  // 전략 변경 시 자동 스크리닝
  const toggleStratAuto=(key)=>{
    const next=st.activeStrats.includes(key)?st.activeStrats.filter(k=>k!==key):[...st.activeStrats,key];
    set("activeStrats",next);
    // 스크리너 모드면 자동 재실행 (딜레이)
    if(st.mode==="screener"&&next.length>0){
      clearTimeout(searchRef.current);
      searchRef.current=setTimeout(()=>runScreenerWith(next),600);
    }
  };

  const runScreenerWith=async(strats)=>{
    set("screenerLoading",true);set("screenerResults",null);
    try{
      const range=intervalToRange(st.timeframe);
      const res=await fetch(`${WORKER_URL}/api/screener?region=${st.region}&range=${range}&interval=${st.timeframe}`);
      const data=await res.json();
      const kRes=await fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(st.region==="us"?"^GSPC":"^KS11")}&range=${range}&interval=${st.timeframe}`).then(r=>r.json());
      setKospiHist(kRes.history||[]);
      const tempStrats=strats||st.activeStrats;
      // RS 백분위를 위해 전종목 Raw Score 수집
      const allRSRaw=[];
      (data.stocks||[]).forEach(s=>{
        if(s.history&&s.history.length>=252){
          const prices=s.history.map(d=>d.adjClose||d.close);
          const raw=calcRSRaw(prices,prices.length-1);
          if(raw!=null)allRSRaw.push(raw);
        }
      });
      const results=(data.stocks||[]).map(s=>{
        if(!s.history||s.history.length<200)return null;
        const sig=evaluateSignals(s.history,kRes.history||[],tempStrats,allRSRaw);
        return{...s,signals:sig.signals,scores:sig.scores,totalScore:sig.totalScore,maxScore:sig.maxScore,buySignal:sig.buySignal,currentPrice:s.history[s.history.length-1]?.adjClose||s.history[s.history.length-1]?.close,details:sig.details};
      }).filter(Boolean);
      set("screenerResults",results);
    }catch(e){set("error","스크리너 실행 실패: "+e.message);}
    set("screenerLoading",false);
  };

  return(
    <div style={{padding:"28px 48px",minHeight:"60vh"}}>
      {/* 모드 + 시장 + 타임프레임 */}
      <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",marginBottom:20,padding:"14px 20px",background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12}}>
        {/* 모드 */}
        <div style={{display:"flex",gap:4,background:"#161B22",padding:3,borderRadius:8}}>
          {[{key:"screener",label:"📊 자동 스크리닝"},{key:"single",label:"🔍 개별 분석"}].map(m=>(
            <button key={m.key} onClick={()=>set("mode",m.key)}
              style={{padding:"7px 14px",border:"none",borderRadius:6,fontSize:12,fontWeight:st.mode===m.key?700:500,
                background:st.mode===m.key?"#161B22":"transparent",color:st.mode===m.key?"#3FB950":"#768390",
                boxShadow:st.mode===m.key?"0 1px 3px rgba(0,0,0,0.05)":"none",cursor:"pointer",transition:"all 0.15s"}}>{m.label}</button>
          ))}
        </div>
        <div style={{height:24,width:1,background:"rgba(48,54,61,0.8)"}}/>
        {/* 시장 선택 */}
        <div style={{display:"flex",gap:4,background:"#161B22",padding:3,borderRadius:8}}>
          {[{key:"kr",label:"🇰🇷 한국"},{key:"us",label:"🇺🇸 미국"}].map(r=>(
            <button key={r.key} onClick={()=>{set("region",r.key);set("screenerResults",null);}}
              style={{padding:"7px 14px",border:"none",borderRadius:6,fontSize:12,fontWeight:st.region===r.key?700:500,
                background:st.region===r.key?"#161B22":"transparent",color:st.region===r.key?"#3FB950":"#768390",
                boxShadow:st.region===r.key?"0 1px 3px rgba(0,0,0,0.05)":"none",cursor:"pointer",transition:"all 0.15s"}}>{r.label}</button>
          ))}
        </div>
        <div style={{height:24,width:1,background:"rgba(48,54,61,0.8)"}}/>
        {/* 타임프레임 */}
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,color:"#636E7B"}}>타임프레임</span>
          <div style={{display:"flex",gap:3}}>
            {TIMEFRAMES.map(tf=>(
              <button key={tf.key} className={`gb ${st.timeframe===tf.key?"on":""}`} onClick={()=>set("timeframe",tf.key)}>{tf.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* 개별 분석 모드: 종목 검색 */}
      {st.mode==="single"&&(
      <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap",marginBottom:20}}>
        <div style={{position:"relative",width:360}}>
          <input type="text" value={searchQ} onChange={e=>onSearchInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&searchResults.length>0){const r=searchResults[0];selectStock(r.symbol,r.name,r.code);}}}
            placeholder="종목 선택 (예: 삼성전자, 005930)"
            style={{width:"100%",padding:"11px 16px 11px 38px",background:"#161B22",border:"1px solid #D6CEC4",borderRadius:8,fontSize:13,fontFamily:"'Noto Sans KR'",color:"#E6EDF3",outline:"none"}}/>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#636E7B",pointerEvents:"none"}}>🔍</span>
          {searchResults.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,marginTop:4,maxHeight:280,overflowY:"auto",zIndex:50,boxShadow:"0 8px 32px rgba(0,0,0,0.08)"}}>
              {searchResults.map((r,i)=>(
                <div key={i} onClick={()=>selectStock(r.symbol,r.name,r.code)}
                  style={{display:"flex",justifyContent:"space-between",padding:"9px 16px",cursor:"pointer",borderBottom:"1px solid #F0EDE8"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#161B22"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div><span style={{fontFamily:"'DM Mono'",fontSize:11,color:"#3FB950",fontWeight:600,marginRight:8}}>{r.code}</span><span style={{fontSize:13,fontWeight:500}}>{r.name}</span></div>
                  <span style={{fontSize:9,color:r.market==="KOSDAQ"?"#3FB950":"#3FB950",fontWeight:600}}>{r.market}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        {st.selected&&<div style={{padding:"8px 16px",background:"rgba(160,120,90,0.08)",borderRadius:8,fontSize:14,fontWeight:600,color:"#3FB950"}}>{st.selected.name}</div>}
      </div>
      )}

      {/* 스크리너 모드: 실행 버튼 */}
      {st.mode==="screener"&&(
      <div style={{marginBottom:20}}>
        <button onClick={()=>runScreenerWith()} disabled={st.screenerLoading}
          style={{padding:"12px 24px",background:st.screenerLoading?"rgba(48,54,61,0.7)":"#3FB950",color:"#161B22",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:st.screenerLoading?"wait":"pointer",fontFamily:"'Noto Sans KR'"}}>
          {st.screenerLoading?`🔍 분석 중... (${st.region==="us"?"미국":"한국"} 종목)`:`📊 ${st.region==="us"?"미국":"한국"} 전체 스크리닝 실행`}
        </button>
        <span style={{marginLeft:12,fontSize:11,color:"#636E7B"}}>※ {st.region==="us"?"미국 S&P500 + ETF ~130":"한국 KOSPI/KOSDAQ ~130"}개 종목 분석 (30초~1분)</span>
      </div>
      )}

      {/* 전략 빌더 */}
      <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>전략 빌더</div>
        <div style={{fontSize:11,color:"#636E7B",marginBottom:14}}>사용할 전략을 선택하고 조건을 설정하세요</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8,marginBottom:16}}>
          {STRATEGIES.map(s=>{
            const active=st.activeStrats.includes(s.key);
            return(
              <div key={s.key} onClick={()=>toggleStratAuto(s.key)}
                style={{padding:"10px 14px",borderRadius:8,cursor:"pointer",border:`1px solid ${active?s.color+"60":"rgba(48,54,61,0.8)"}`,background:active?s.color+"08":"#161B22",transition:"all 0.15s"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{width:8,height:8,borderRadius:2,background:active?s.color:"rgba(48,54,61,0.7)"}}/>
                  <span style={{fontSize:12,fontWeight:600,color:active?s.color:"#768390"}}>{s.name}</span>
                </div>
                <div style={{fontSize:10,color:"#636E7B",lineHeight:1.4}}>{s.desc}</div>
              </div>
            );
          })}
        </div>
        {/* 파라미터 & 조건 */}
        <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",padding:"12px 0",borderTop:"1px solid #F0EDE8"}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#636E7B"}}>매수 조건</span>
            <select value={st.conditionMode} onChange={e=>set("conditionMode",e.target.value)} style={{padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}>
              <option value="and">모든 조건 충족 (AND)</option>
              <option value="score">N개 이상 충족</option>
            </select>
            {st.conditionMode==="score"&&<input type="number" value={st.minScore} onChange={e=>set("minScore",+e.target.value)} min={1} max={7} style={{width:50,padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}/>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#636E7B"}}>MA단기</span>
            <select value={st.maShort} onChange={e=>set("maShort",+e.target.value)} style={{padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}><option value={5}>5</option><option value={20}>20</option></select>
            <span style={{fontSize:11,color:"#636E7B"}}>MA장기</span>
            <select value={st.maLong} onChange={e=>set("maLong",+e.target.value)} style={{padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}><option value={60}>60</option><option value={120}>120</option><option value={200}>200</option></select>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#636E7B"}}>돌파K</span>
            <select value={st.breakoutK} onChange={e=>set("breakoutK",+e.target.value)} style={{padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}><option value={0.3}>0.3</option><option value={0.5}>0.5</option><option value={0.7}>0.7</option></select>
            <span style={{fontSize:11,color:"#636E7B"}}>모멘텀</span>
            <select value={st.momPeriod} onChange={e=>set("momPeriod",+e.target.value)} style={{padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}><option value={20}>20일</option><option value={60}>60일</option><option value={120}>120일</option></select>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#636E7B"}}>수수료%</span>
            <input type="number" value={st.feePercent} onChange={e=>set("feePercent",+e.target.value)} step={0.05} min={0} max={5} style={{width:60,padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}/>
          </div>   
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#636E7B"}}>초기자금</span>
            <input type="number" value={st.initAmt} onChange={e=>set("initAmt",+e.target.value)} style={{width:100,padding:"5px 8px",border:"1px solid #D6CEC4",borderRadius:4,fontSize:11,fontFamily:"'DM Mono'"}}/>
            <span style={{fontSize:10,color:"#636E7B"}}>원</span>
          </div>
        </div>
      </div>

      {st.error&&<div style={{background:"rgba(248,81,73,0.08)",border:"1px solid rgba(139,64,73,0.2)",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#FF7B72"}}>{st.error}</div>}
      {st.loading&&<div style={{textAlign:"center",padding:60,color:"#3FB950",fontSize:13}}>데이터 로딩 중...</div>}

      {!st.loading&&st.mode==="single"&&strategyAnalysis&&(
        <div style={{animation:"fadeIn 0.3s ease"}}>
          {/* 현재 전략 대시보드 */}
          <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div><div style={{fontSize:15,fontWeight:700}}>현재 시그널 대시보드</div>
                <div style={{fontSize:11,color:"#636E7B"}}>최신 거래일 기준 · {strategyAnalysis.latest?.date}</div></div>
              <div style={{padding:"8px 16px",borderRadius:8,fontSize:14,fontWeight:700,
                background:strategyAnalysis.latest?.buySignal?"rgba(63,185,80,0.12)":"rgba(248,81,73,0.12)",
                color:strategyAnalysis.latest?.buySignal?"#3FB950":"#FF7B72"}}>
                {strategyAnalysis.latest?.buySignal?"매수 시그널 🟢":"대기/매도 🔴"} ({strategyAnalysis.latest?.totalScore}/{strategyAnalysis.latest?.maxScore})
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>
              {STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>{
                const score=strategyAnalysis.latest?.scores[s.key];
                const detail=s.key==="rs"?`RS: ${strategyAnalysis.latest?.rsValue?.toFixed(1)||"—"}`:
                  s.key==="momentum"?`${strategyAnalysis.latest?.momValue?.toFixed(1)||"—"}%`:
                  s.key==="minervini"?`저점+${strategyAnalysis.latest?.minerviniDetail?.fromLow||"—"}% 고점-${strategyAnalysis.latest?.minerviniDetail?.fromHigh||"—"}%`:"";
                return(
                  <div key={s.key} style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${score>=1?s.color+"40":"rgba(48,54,61,0.8)"}`,background:score>=1?s.color+"08":"#161B22"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:11,fontWeight:600,color:s.color}}>{s.name}</span>
                      <span style={{fontSize:16}}>{score>=1?"✅":score<=-1?"❌":"⏸️"}</span>
                    </div>
                    {detail&&<div style={{fontSize:10,color:"#768390",fontFamily:"'DM Mono'"}}>{detail}</div>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* 백테스트 성과 */}
          <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>백테스트 결과</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:20}}>
              {[
                {label:"총 수익률",value:`${strategyAnalysis.stats.totalReturn}%`,color:retColor(parseFloat(strategyAnalysis.stats.totalReturn))},
                {label:"CAGR",value:`${strategyAnalysis.stats.cagr}%`,color:"#3FB950"},
                {label:"MDD",value:`-${strategyAnalysis.stats.mdd}%`,color:"#FF7B72"},
                {label:"매매 횟수",value:`${strategyAnalysis.stats.trades}회`},
                {label:"승률",value:`${strategyAnalysis.stats.winRate}%`,color:parseFloat(strategyAnalysis.stats.winRate)>50?"#3FB950":"#FF7B72"},
                {label:"승/패",value:`${strategyAnalysis.stats.wins}/${strategyAnalysis.stats.losses}`},
                {label:"최종 자산",value:fmtKRW(strategyAnalysis.stats.finalValue),color:"#3FB950"},
                {label:"초기 자금",value:fmtKRW(st.initAmt)},
              ].map((item,i)=>(
                <div key={i} style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,padding:"10px 14px"}}>
                  <div style={{fontSize:10,color:"#636E7B",marginBottom:4}}>{item.label}</div>
                  <div style={{fontFamily:"'DM Mono'",fontSize:14,fontWeight:600,color:item.color||"#CDD9E5"}}>{item.value}</div>
                </div>
              ))}
            </div>

            {/* 자산 곡선 */}
            <ResponsiveContainer width="100%" height={350}>
              <LineChart data={strategyAnalysis.chartData} margin={{top:5,right:10,bottom:5,left:10}}>
                <CartesianGrid stroke="rgba(26,35,50,0.06)"/>
                <XAxis dataKey="date" tick={{fill:"#636E7B",fontSize:10,fontFamily:"'DM Mono'"}} tickLine={false} interval={Math.max(0,Math.floor(strategyAnalysis.chartData.length/8))}
                  tickFormatter={d=>{const[y,m]=d.split("-");return`${y.slice(2)}.${m}`;}}/>
                <YAxis yAxisId="val" tick={{fill:"#3FB950",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false}
                  tickFormatter={v=>v>=1e6?`${(v/1e6).toFixed(0)}M`:v>=1e4?`${(v/1e4).toFixed(0)}만`:fmtNum(v)}/>
                <YAxis yAxisId="price" orientation="right" tick={{fill:"#636E7B",fontSize:10,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false}
                  tickFormatter={v=>v>=10000?`${(v/10000).toFixed(0)}만`:fmtNum(v)}/>
                <Tooltip contentStyle={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:11}}
                  formatter={(v,name)=>name==="value"?[fmtKRW(v),"자산"]:name==="price"?[fmtKRW(v),"주가"]:[`${v}/${strategyAnalysis.latest?.maxScore}`,"점수"]}/>
                <Line yAxisId="val" type="monotone" dataKey="value" stroke="#3FB950" strokeWidth={2} dot={false} name="value"/>
                <Line yAxisId="price" type="monotone" dataKey="price" stroke="rgba(48,54,61,0.7)" strokeWidth={1} dot={false} name="price"/>
                <ReferenceLine yAxisId="val" y={st.initAmt} stroke="rgba(110,118,129,0.3)" strokeDasharray="4 4"/>
              </LineChart>
            </ResponsiveContainer>
          </div>

          {/* 매매 내역 */}
          <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px"}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>매매 내역 (최근 40건)</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{["구분","날짜","가격","점수/수익률"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",fontSize:10,color:"#636E7B",borderBottom:"2px solid #E8E2DA",fontWeight:500}}>{h}</th>)}</tr></thead>
                <tbody>{strategyAnalysis.trades.slice(-40).reverse().map((t,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #F0EDE8"}}>
                    <td style={{padding:"8px 12px"}}><span style={{fontSize:11,fontWeight:600,color:t.type==="buy"?"#3FB950":"#FF7B72",background:t.type==="buy"?"rgba(63,185,80,0.1)":"rgba(139,64,73,0.08)",padding:"2px 8px",borderRadius:3}}>{t.type==="buy"?"매수":"매도"}</span></td>
                    <td style={{padding:"8px 12px",fontFamily:"'DM Mono'",color:"#ADBAC7"}}>{t.date}</td>
                    <td style={{padding:"8px 12px",fontFamily:"'DM Mono'"}}>{fmtKRW(t.price)}</td>
                    <td style={{padding:"8px 12px",fontFamily:"'DM Mono'",color:t.type==="buy"?"#768390":parseFloat(t.ret)>0?"#3FB950":"#FF7B72",fontWeight:t.type==="sell"?600:400}}>{t.type==="buy"?`${t.score}점`:`${t.ret}%`}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {!st.loading&&st.mode==="single"&&!st.selected&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#636E7B"}}>
          <div style={{fontSize:40,marginBottom:16}}>📊</div>
          <div style={{fontSize:16,fontWeight:600,color:"#768390",marginBottom:10}}>멀티 전략 추세추종 & 백테스트</div>
          <div style={{fontSize:12,lineHeight:2,maxWidth:440,margin:"0 auto"}}>
            종목을 선택하고 전략을 조합하면 자동으로 백테스트합니다.<br/>
            7가지 전략을 자유롭게 ON/OFF 하고 조건을 설정하세요.<br/>
            <strong style={{color:"#3FB950"}}>MA크로스 · MA정배열 · 미너비니 · RS상대강도</strong><br/>
            <strong style={{color:"#3FB950"}}>볼린저밴드 · 변동성돌파 · 듀얼모멘텀</strong>
          </div>
        </div>
      )}

      {/* ── 스크리너 결과 ── */}
      {st.mode==="screener"&&st.screenerLoading&&(
        <div style={{textAlign:"center",padding:60,color:"#3FB950",fontSize:13}}>
          <div style={{marginBottom:8}}>전체 종목 분석 중...</div>
          <div style={{fontSize:11,color:"#636E7B"}}>60개 종목 × {STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).length}개 전략</div>
        </div>
      )}
      {st.mode==="screener"&&!st.screenerLoading&&st.screenerResults&&(
        <div style={{animation:"fadeIn 0.3s ease"}}>
          {/* 요약 카드 */}
          {(()=>{
            const buyList=st.screenerResults.filter(r=>r.buySignal).sort((a,b)=>b.totalScore-a.totalScore);
            const watchList=st.screenerResults.filter(r=>!r.buySignal&&r.totalScore>=Math.max(1,st.minScore-1)).sort((a,b)=>b.totalScore-a.totalScore);
            return(
              <>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:20}}>
                  <div style={{background:"rgba(63,185,80,0.1)",border:"1px solid rgba(92,122,94,0.2)",borderRadius:8,padding:"14px 18px"}}>
                    <div style={{fontSize:10,color:"#768390",marginBottom:4}}>매수 시그널 종목</div>
                    <div style={{fontSize:22,fontWeight:700,color:"#3FB950",fontFamily:"'DM Mono'"}}>{buyList.length}<span style={{fontSize:12,color:"#636E7B",marginLeft:4}}>/ {st.screenerResults.length}</span></div>
                  </div>
                  <div style={{background:"rgba(160,120,90,0.08)",border:"1px solid rgba(160,120,90,0.2)",borderRadius:8,padding:"14px 18px"}}>
                    <div style={{fontSize:10,color:"#768390",marginBottom:4}}>관심 종목</div>
                    <div style={{fontSize:22,fontWeight:700,color:"#3FB950",fontFamily:"'DM Mono'"}}>{watchList.length}</div>
                  </div>
                  <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,padding:"14px 18px"}}>
                    <div style={{fontSize:10,color:"#768390",marginBottom:4}}>활성 전략</div>
                    <div style={{fontSize:14,fontWeight:600,color:"#CDD9E5"}}>{st.activeStrats.length}개</div>
                  </div>
                  <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,padding:"14px 18px"}}>
                    <div style={{fontSize:10,color:"#768390",marginBottom:4}}>매수 조건</div>
                    <div style={{fontSize:14,fontWeight:600,color:"#CDD9E5"}}>{st.conditionMode==="and"?"전체 충족":`${st.minScore}개+ 충족`}</div>
                  </div>
                </div>

                {/* 매수 시그널 테이블 */}
                <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>🟢 매수 시그널 종목 ({buyList.length})</div>
                  {buyList.length===0?(
                    <div style={{textAlign:"center",padding:30,color:"#636E7B",fontSize:13}}>현재 매수 조건을 충족하는 종목이 없습니다.<br/><span style={{fontSize:11}}>조건을 완화하거나 다른 전략을 활성화해보세요.</span></div>
                  ):(
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead><tr>{["순위","종목","시장","섹터","현재가","점수",...STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>s.name)].map((h,i)=>
                          <th key={i} style={{textAlign:"left",padding:"8px 10px",fontSize:10,color:"#636E7B",borderBottom:"2px solid #E8E2DA",fontWeight:500,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                        <tbody>{buyList.map((r,i)=>(
                          <tr key={r.symbol} style={{borderBottom:"1px solid #F0EDE8"}}>
                            <td style={{padding:"8px 10px",fontFamily:"'DM Mono'",color:"#3FB950",fontWeight:600}}>#{i+1}</td>
                            <td style={{padding:"8px 10px"}}><span style={{fontFamily:"'DM Mono'",fontSize:10,color:"#3FB950",fontWeight:600,marginRight:6}}>{r.code}</span><span style={{fontSize:12,fontWeight:600}}>{r.name}</span></td>
                            <td style={{padding:"8px 10px"}}><span style={{fontSize:9,color:r.market==="KOSDAQ"?"#3FB950":"#3FB950",background:r.market==="KOSDAQ"?"rgba(160,120,90,0.08)":"rgba(63,185,80,0.1)",padding:"2px 6px",borderRadius:3,fontWeight:600}}>{r.market}</span></td>
                            <td style={{padding:"8px 10px",fontSize:11,color:"#768390"}}>{r.sector}</td>
                            <td style={{padding:"8px 10px",fontFamily:"'DM Mono'"}}>{fmtKRW(r.currentPrice)}</td>
                            <td style={{padding:"8px 10px"}}><span style={{background:"rgba(63,185,80,0.12)",color:"#3FB950",padding:"3px 8px",borderRadius:4,fontFamily:"'DM Mono'",fontWeight:700,fontSize:11}}>{r.totalScore}/{r.maxScore}</span></td>
                            {STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>(
                              <td key={s.key} style={{padding:"8px 10px",textAlign:"center",fontSize:14}}>{r.scores[s.key]>=1?"✅":r.scores[s.key]<=-1?"❌":"⏸️"}</td>
                            ))}
                          </tr>
                        ))}</tbody>
                      </table>
                    </div>
                  )}
                </div>

                {/* 관심 종목 테이블 */}
                {watchList.length>0&&(
                  <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px"}}>
                    <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>👀 관심 종목 ({watchList.length})</div>
                    <div style={{fontSize:11,color:"#636E7B",marginBottom:14}}>매수 조건에는 미달하지만 일부 시그널이 충족된 종목</div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead><tr>{["종목","시장","현재가","점수",...STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>s.name)].map((h,i)=>
                          <th key={i} style={{textAlign:"left",padding:"8px 10px",fontSize:10,color:"#636E7B",borderBottom:"2px solid #E8E2DA",fontWeight:500,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                        <tbody>{watchList.slice(0,20).map(r=>(
                          <tr key={r.symbol} style={{borderBottom:"1px solid #F0EDE8"}}>
                            <td style={{padding:"8px 10px"}}><span style={{fontFamily:"'DM Mono'",fontSize:10,color:"#3FB950",fontWeight:600,marginRight:6}}>{r.code}</span><span style={{fontSize:12,fontWeight:500}}>{r.name}</span></td>
                            <td style={{padding:"8px 10px"}}><span style={{fontSize:9,color:r.market==="KOSDAQ"?"#3FB950":"#3FB950",fontWeight:600}}>{r.market}</span></td>
                            <td style={{padding:"8px 10px",fontFamily:"'DM Mono'"}}>{fmtKRW(r.currentPrice)}</td>
                            <td style={{padding:"8px 10px"}}><span style={{background:"rgba(160,120,90,0.1)",color:"#3FB950",padding:"3px 8px",borderRadius:4,fontFamily:"'DM Mono'",fontWeight:600,fontSize:11}}>{r.totalScore}/{r.maxScore}</span></td>
                            {STRATEGIES.filter(s=>st.activeStrats.includes(s.key)).map(s=>(
                              <td key={s.key} style={{padding:"8px 10px",textAlign:"center",fontSize:13}}>{r.scores[s.key]>=1?"✅":r.scores[s.key]<=-1?"❌":"⏸️"}</td>
                            ))}
                          </tr>
                        ))}</tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}
      {st.mode==="screener"&&!st.screenerLoading&&!st.screenerResults&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#636E7B"}}>
          <div style={{fontSize:40,marginBottom:16}}>🔍</div>
          <div style={{fontSize:16,fontWeight:600,color:"#768390",marginBottom:10}}>전체 종목 자동 스크리닝</div>
          <div style={{fontSize:12,lineHeight:2,maxWidth:440,margin:"0 auto"}}>
            위에서 전략과 조건을 설정한 후 <strong style={{color:"#3FB950"}}>"스크리닝 실행"</strong> 버튼을 누르면<br/>
            60개 한국 주요 종목을 모두 분석해서 매수 시그널 종목만 보여줍니다.
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   CORRELATION — 매크로 상관관계 분석 탭
   ═══════════════════════════════════════════════ */
const MACRO_INDICATORS=[
  {key:"kospi",ticker:"^KS11",name:"KOSPI",color:"#FF7B72"},
  {key:"sp500",ticker:"^GSPC",name:"S&P 500",color:"#CDD9E5"},
  {key:"nasdaq",ticker:"^IXIC",name:"나스닥",color:"#3FB950"},
  {key:"usd10y",ticker:"^TNX",name:"미국 10년물 금리",color:"#79C0FF"},
  {key:"vix",ticker:"^VIX",name:"VIX 공포지수",color:"#F778BA"},
  {key:"dxy",ticker:"DX-Y.NYB",name:"달러 인덱스",color:"#D29922"},
  {key:"krwusd",ticker:"KRW=X",name:"원/달러 환율",color:"#3FB950"},
  {key:"wti",ticker:"CL=F",name:"WTI 유가",color:"#D29922"},
  {key:"gold",ticker:"GC=F",name:"금",color:"#56D364"},
  {key:"copper",ticker:"HG=F",name:"구리",color:"#FFAB70"},
];

function CorrelationTab({corrState,setCorrState}){
  const st=corrState;
  const set=(k,v)=>setCorrState(p=>({...p,[k]:v}));

  const loadData=async()=>{
    if(st.loaded)return;
    set("loading",true);
    const allData={};
    for(const ind of MACRO_INDICATORS){
      try{
        const res=await fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(ind.ticker)}&range=5y`);
        const d=await res.json();
        allData[ind.key]=(d.history||[]).map(h=>({date:h.date,price:h.adjClose||h.close}));
      }catch(e){allData[ind.key]=[];}
    }
    set("data",allData);set("loaded",true);set("loading",false);
  };

  useEffect(()=>{loadData();},[]);

  // 상관계수 계산
  const pearson=(x,y)=>{
    const n=Math.min(x.length,y.length);if(n<10)return null;
    const mx=x.slice(0,n).reduce((a,b)=>a+b,0)/n;
    const my=y.slice(0,n).reduce((a,b)=>a+b,0)/n;
    let num=0,dx=0,dy=0;
    for(let i=0;i<n;i++){const xi=x[i]-mx,yi=y[i]-my;num+=xi*yi;dx+=xi*xi;dy+=yi*yi;}
    return dx&&dy?num/Math.sqrt(dx*dy):0;
  };

  // 일간 수익률로 변환
  const toReturns=(data)=>{
    const rets=[];
    for(let i=1;i<data.length;i++){
      if(data[i].price&&data[i-1].price)rets.push({date:data[i].date,ret:(data[i].price/data[i-1].price-1)*100});
    }
    return rets;
  };

  // 상관관계 매트릭스
  const corrMatrix=useMemo(()=>{
    if(!st.loaded||!st.data)return null;
    const keys=MACRO_INDICATORS.map(i=>i.key);
    const returns={};
    keys.forEach(k=>{returns[k]=toReturns(st.data[k]||[]);});

    const matrix={};
    keys.forEach(k1=>{
      matrix[k1]={};
      keys.forEach(k2=>{
        if(k1===k2){matrix[k1][k2]=1;return;}
        // 날짜 매칭
        const r1Map={};returns[k1].forEach(r=>{r1Map[r.date]=r.ret;});
        const paired=returns[k2].filter(r=>r1Map[r.date]!=null).map(r=>({x:r1Map[r.date],y:r.ret}));
        if(paired.length<30){matrix[k1][k2]=null;return;}
        matrix[k1][k2]=pearson(paired.map(p=>p.x),paired.map(p=>p.y));
      });
    });
    return matrix;
  },[st.loaded,st.data]);

  // 듀얼 차트 데이터
  const dualChartData=useMemo(()=>{
    if(!st.data||!st.dualA||!st.dualB)return[];
    const a=st.data[st.dualA]||[];
    const b=st.data[st.dualB]||[];
    const bMap={};b.forEach(d=>{bMap[d.date]=d.price;});
    const step=Math.max(1,Math.floor(a.length/200));
    return a.filter((_,i)=>i%step===0).map(d=>({date:d.date,a:d.price,b:bMap[d.date]||null})).filter(d=>d.b!=null);
  },[st.data,st.dualA,st.dualB]);

  const corrColor=(v)=>{
    if(v==null)return"rgba(48,54,61,0.8)";
    const abs=Math.abs(v);
    if(v>0)return`rgba(92,122,94,${abs*0.8+0.1})`;
    return`rgba(139,64,73,${abs*0.8+0.1})`;
  };

  const indName=(key)=>MACRO_INDICATORS.find(i=>i.key===key)?.name||key;

  return(
    <div style={{padding:"28px 48px",minHeight:"60vh"}}>
      {st.loading&&<div style={{textAlign:"center",padding:60,color:"#3FB950",fontSize:13}}>글로벌 매크로 데이터 로딩 중... (10개 지표)</div>}

      {st.loaded&&corrMatrix&&(
        <div style={{animation:"fadeIn 0.3s ease"}}>
          {/* 히트맵 */}
          <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>상관관계 히트맵</div>
            <div style={{fontSize:11,color:"#636E7B",marginBottom:16}}>일간 수익률 기반 피어슨 상관계수 · 최근 5년</div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontSize:11,fontFamily:"'DM Mono'"}}>
                <thead><tr><th style={{padding:6}}></th>{MACRO_INDICATORS.map(ind=><th key={ind.key} style={{padding:"6px 4px",fontSize:9,color:"#768390",fontWeight:500,writingMode:"vertical-rl",height:80,textAlign:"left"}}>{ind.name}</th>)}</tr></thead>
                <tbody>{MACRO_INDICATORS.map(row=>(
                  <tr key={row.key}>
                    <td style={{padding:"6px 8px",fontSize:10,color:"#ADBAC7",fontWeight:500,whiteSpace:"nowrap"}}>{row.name}</td>
                    {MACRO_INDICATORS.map(col=>{
                      const v=corrMatrix[row.key]?.[col.key];
                      return(<td key={col.key} style={{padding:4,textAlign:"center",cursor:"pointer"}}
                        onClick={()=>{set("dualA",row.key);set("dualB",col.key);}}>
                        <div style={{width:44,height:32,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:4,
                          background:corrColor(v),color:v!=null&&Math.abs(v)>0.3?"#161B22":"#ADBAC7",fontSize:10,fontWeight:v!=null&&Math.abs(v)>0.5?600:400}}>
                          {v!=null?v.toFixed(2):"—"}
                        </div>
                      </td>);
                    })}
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{fontSize:10,color:"#636E7B",marginTop:10}}>셀을 클릭하면 아래에서 두 지표의 추이를 비교할 수 있습니다</div>
          </div>

          {/* 듀얼 차트 */}
          {st.dualA&&st.dualB&&dualChartData.length>0&&(
            <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"20px 24px",marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:15,fontWeight:700}}>{indName(st.dualA)} vs {indName(st.dualB)}</div>
                <div style={{fontSize:11,color:"#636E7B",fontFamily:"'DM Mono'"}}>상관계수: <span style={{fontWeight:600,color:corrMatrix[st.dualA]?.[st.dualB]>0?"#3FB950":"#FF7B72"}}>{corrMatrix[st.dualA]?.[st.dualB]?.toFixed(3)||"—"}</span></div>
              </div>
              <ResponsiveContainer width="100%" height={350}>
                <LineChart data={dualChartData} margin={{top:5,right:60,bottom:5,left:10}}>
                  <CartesianGrid stroke="rgba(26,35,50,0.06)"/>
                  <XAxis dataKey="date" tick={{fill:"#636E7B",fontSize:10,fontFamily:"'DM Mono'"}} tickLine={false} interval={Math.max(0,Math.floor(dualChartData.length/8))}
                    tickFormatter={d=>{const[y,m]=d.split("-");return`${y.slice(2)}.${m}`;}}/>
                  <YAxis yAxisId="left" tick={{fill:"#3FB950",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false}/>
                  <YAxis yAxisId="right" orientation="right" tick={{fill:"#3FB950",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false}/>
                  <Tooltip contentStyle={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:11}}
                    formatter={(v,name)=>[Number(v).toFixed(2),name==="a"?indName(st.dualA):indName(st.dualB)]}/>
                  <Line yAxisId="left" type="monotone" dataKey="a" stroke="#3FB950" strokeWidth={2} dot={false} name="a"/>
                  <Line yAxisId="right" type="monotone" dataKey="b" stroke="#3FB950" strokeWidth={2} dot={false} name="b"/>
                </LineChart>
              </ResponsiveContainer>
              <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:8}}>
                <span style={{fontSize:11,color:"#3FB950"}}>━ {indName(st.dualA)} (좌축)</span>
                <span style={{fontSize:11,color:"#3FB950"}}>━ {indName(st.dualB)} (우축)</span>
              </div>
            </div>
          )}

          {/* 지표 선택 */}
          <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"16px 24px"}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>비교할 지표 선택</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {MACRO_INDICATORS.map(ind=>(
                <button key={ind.key} className={`gb ${st.dualA===ind.key||st.dualB===ind.key?"on":""}`}
                  onClick={()=>{if(st.dualA===ind.key)return;if(st.dualB===ind.key)return;set("dualB",st.dualA);set("dualA",ind.key);}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:ind.color,display:"inline-block",marginRight:4}}/>
                  {ind.name}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   STOCK EXPLORER — 한국 종목 검색/분석 탭
   달력 기간 선택 + 멀티 종목 비교 차트
   ═══════════════════════════════════════════════ */
const COMPARE_COLORS=["#3FB950","#3FB950","#FF7B72","#79C0FF","#D29922","#F778BA"];

function StockExplorer({stockState,setStockState}){
  const st=stockState;
  const set=(k,v)=>setStockState(p=>({...p,[k]:v}));
  const stocks=st.stocks||[];
  const setStocks=(fn)=>set("stocks",typeof fn==="function"?fn(stocks):fn);

  const[query,setQuery]=useState("");
  const[results,setResults]=useState([]);
  const[searching,setSearching]=useState(false);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const searchTimeout=useRef(null);

  const doSearch=async(q)=>{
    if(!q||q.length<1)return setResults([]);
    setSearching(true);
    try{
      const r=await fetch(`${WORKER_URL}/api/search?q=${encodeURIComponent(q)}`);
      const d=await r.json();
      setResults(d.results||[]);
    }catch(e){setError("검색 서버에 연결할 수 없습니다.");}
    setSearching(false);
  };

  const onInput=(v)=>{
    setQuery(v);setError(null);
    clearTimeout(searchTimeout.current);
    if(v.length>=1)searchTimeout.current=setTimeout(()=>doSearch(v),300);
    else setResults([]);
  };

  const addStock=async(symbol,name,code)=>{
    if(stocks.find(s=>s.symbol===symbol))return;
    if(stocks.length>=6){setError("최대 6개까지 비교할 수 있습니다.");return;}
    setResults([]);setQuery("");setLoading(true);setError(null);
    try{
      const[qRes,hRes]=await Promise.all([
        fetch(`${WORKER_URL}/api/quote?symbol=${encodeURIComponent(symbol)}`).then(r=>r.json()),
        fetch(`${WORKER_URL}/api/history?symbol=${encodeURIComponent(symbol)}&range=5y`).then(r=>r.json())
      ]);
      const color=COMPARE_COLORS[stocks.length%COMPARE_COLORS.length];
      setStocks(prev=>[...prev,{symbol,name,code,quote:qRes.quote,history:hRes.history||[],color}]);
    }catch(e){setError("데이터를 불러올 수 없습니다.");}
    setLoading(false);
  };

  const removeStock=(symbol)=>setStocks(prev=>prev.filter(s=>s.symbol!==symbol));

  // 날짜 필터링된 히스토리
  const filteredStocks=useMemo(()=>{
    return stocks.map(s=>{
      const filtered=s.history.filter(d=>d.date>=st.startDate&&d.date<=st.endDate);
      return{...s,filtered};
    });
  },[stocks,st.startDate,st.endDate]);

  // 비교 차트 데이터 (수익률 기준 정규화)
  const chartData=useMemo(()=>{
    if(!filteredStocks.length)return[];
    const allDates=[...new Set(filteredStocks.flatMap(s=>s.filtered.map(d=>d.date)))].sort();
    const step=Math.max(1,Math.floor(allDates.length/250));
    const sampledDates=allDates.filter((_,i)=>i%step===0||i===allDates.length-1);

    return sampledDates.map(date=>{
      const pt={date};
      filteredStocks.forEach(s=>{
        const rec=s.filtered.find(d=>d.date===date)||s.filtered.reduce((prev,curr)=>(!prev||curr.date<=date?curr:prev),null);
        if(!rec)return;
        const price=rec.adjClose||rec.close;
        if(st.chartMode==="percent"){
          const base=s.filtered[0];
          const basePrice=base?(base.adjClose||base.close):price;
          pt[s.symbol]=basePrice?((price/basePrice-1)*100):0;
        }else{
          pt[s.symbol]=price;
        }
      });
      return pt;
    });
  },[filteredStocks,st.chartMode]);

  // 기간 수익률 계산
  const calcReturns=(hist)=>{
    if(!hist||hist.length<2)return{};
    const last=hist[hist.length-1];
    const getReturn=(days)=>{
      const idx=Math.max(0,hist.length-1-days);
      const base=hist[idx];if(!base)return null;
      return((last.adjClose||last.close)/(base.adjClose||base.close)-1)*100;
    };
    const first=hist[0];
    const periodReturn=first?((last.adjClose||last.close)/(first.adjClose||first.close)-1)*100:null;
    return{d1:getReturn(1),w1:getReturn(5),m1:getReturn(21),m3:getReturn(63),m6:getReturn(126),y1:getReturn(252),period:periodReturn};
  };

  const fmtKRW=(v)=>{if(v==null||isNaN(v))return"—";return Number(v).toLocaleString("ko-KR")+"원";};
  const fmtNum=(v)=>{if(v==null||isNaN(v))return"—";return Number(v).toLocaleString("ko-KR");};
  const fmtBig=(v)=>{if(!v)return"—";const n=Number(v);if(n>=1e12)return`${(n/1e12).toFixed(1)}조`;if(n>=1e8)return`${(n/1e8).toFixed(0)}억`;if(n>=1e4)return`${(n/1e4).toFixed(0)}만`;return n.toLocaleString("ko-KR");};
  const retColor=(v)=>v>0?"#3FB950":v<0?"#FF7B72":"#768390";
  const retFmt=(v)=>v==null?"—":`${v>0?"+":""}${v.toFixed(2)}%`;

  const presets=[
    {label:"1개월",fn:()=>{const d=new Date();const s=new Date();s.setMonth(s.getMonth()-1);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"3개월",fn:()=>{const d=new Date();const s=new Date();s.setMonth(s.getMonth()-3);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"6개월",fn:()=>{const d=new Date();const s=new Date();s.setMonth(s.getMonth()-6);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"1년",fn:()=>{const d=new Date();const s=new Date();s.setFullYear(s.getFullYear()-1);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"3년",fn:()=>{const d=new Date();const s=new Date();s.setFullYear(s.getFullYear()-3);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
    {label:"5년",fn:()=>{const d=new Date();const s=new Date();s.setFullYear(s.getFullYear()-5);set("startDate",s.toISOString().split("T")[0]);set("endDate",d.toISOString().split("T")[0]);}},
  ];

  return(
    <div style={{padding:"28px 48px",minHeight:"60vh"}}>
      {/* 검색 + 종목 태그 */}
      <div style={{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap",marginBottom:20}}>
        <div style={{position:"relative",width:400}}>
          <div style={{position:"relative"}}>
            <input type="text" value={query} onChange={e=>onInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&results.length>0){const r=results[0];addStock(r.symbol,r.name,r.code);}}}
              placeholder="종목 추가 (예: 삼성전자, 005930)"
              style={{width:"100%",padding:"11px 16px 11px 38px",background:"#161B22",border:"1px solid #D6CEC4",borderRadius:8,fontSize:13,fontFamily:"'Noto Sans KR'",color:"#E6EDF3",outline:"none"}}/>
            <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#636E7B",pointerEvents:"none"}}>🔍</span>
          </div>
          {searching&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,marginTop:4,padding:14,textAlign:"center",fontSize:12,color:"#636E7B",zIndex:50}}>검색 중...</div>}
          {results.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,marginTop:4,maxHeight:320,overflowY:"auto",zIndex:50,boxShadow:"0 8px 32px rgba(0,0,0,0.08)"}}>
              {results.map((r,i)=>(
                <div key={i} onClick={()=>addStock(r.symbol,r.name,r.code)}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",cursor:"pointer",borderBottom:"1px solid #F0EDE8",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#161B22"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontFamily:"'DM Mono'",fontSize:11,color:"#3FB950",fontWeight:600,background:"rgba(160,120,90,0.08)",padding:"2px 7px",borderRadius:3}}>{r.code}</span>
                    <span style={{fontSize:13,color:"#E6EDF3",fontWeight:500}}>{r.name}</span>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#636E7B"}}>{r.sector}</span>
                    <span style={{fontSize:9,color:r.market==="KOSDAQ"?"#3FB950":"#3FB950",background:r.market==="KOSDAQ"?"rgba(160,120,90,0.08)":"rgba(63,185,80,0.1)",padding:"2px 6px",borderRadius:3,fontWeight:600}}>{r.market}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* 선택된 종목 태그 */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",flex:1}}>
          {stocks.map(s=>(
            <div key={s.symbol} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",background:s.color+"12",border:`1px solid ${s.color}40`,borderRadius:20,fontSize:12,color:s.color,fontWeight:600}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:s.color}}/>
              {s.name}
              <span onClick={()=>removeStock(s.symbol)} style={{cursor:"pointer",fontSize:14,marginLeft:2,color:s.color+"90"}}>✕</span>
            </div>
          ))}
          {stocks.length>0&&<span style={{fontSize:10,color:"#636E7B"}}>최대 6개</span>}
        </div>
      </div>

      {error&&<div style={{background:"rgba(248,81,73,0.08)",border:"1px solid rgba(139,64,73,0.2)",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#FF7B72"}}>{error}</div>}
      {loading&&<div style={{textAlign:"center",padding:40,color:"#3FB950",fontSize:13}}>데이터 로딩 중...</div>}

      {stocks.length>0&&(
        <div style={{animation:"fadeIn 0.3s ease"}}>
          {/* 기간 선택 */}
          <div style={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:12,padding:"16px 24px",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:"#636E7B",fontWeight:500}}>기간</span>
                <input type="date" value={st.startDate} onChange={e=>set("startDate",e.target.value)}
                  style={{padding:"6px 10px",border:"1px solid #D6CEC4",borderRadius:6,fontSize:12,fontFamily:"'DM Mono'",color:"#E6EDF3",outline:"none"}}/>
                <span style={{color:"#636E7B"}}>~</span>
                <input type="date" value={st.endDate} onChange={e=>set("endDate",e.target.value)}
                  style={{padding:"6px 10px",border:"1px solid #D6CEC4",borderRadius:6,fontSize:12,fontFamily:"'DM Mono'",color:"#E6EDF3",outline:"none"}}/>
              </div>
              <div style={{display:"flex",gap:4}}>
                {presets.map(p=><button key={p.label} className="gb" onClick={p.fn}>{p.label}</button>)}
              </div>
              <div style={{marginLeft:"auto",display:"flex",gap:4}}>
                <button className={`gb ${st.chartMode==="price"?"on":""}`} onClick={()=>set("chartMode","price")}>가격</button>
                <button className={`gb ${st.chartMode==="percent"?"on":""}`} onClick={()=>set("chartMode","percent")}>수익률 %</button>
              </div>
            </div>
          </div>

          {/* 비교 차트 */}
          {chartData.length>0&&(

                    {label:"52주 최고",value:fmtKRW(s.quote?.week52High)},

                  {[

                    {label:"3개월",value:ret.m3},{label:"6개월",value:ret.m6},{label:"1년",value:ret.y1},
                    {label:"선택기간",value:ret.period},

                    <div key={i} style={{background:"#161B22",borderRadius:6,padding:"6px 10px",textAlign:"center",minWidth:70}}>

                      <div style={{fontFamily:"'DM Mono'",fontSize:13,fontWeight:600,color:retColor(item.value)}}>{retFmt(item.value)}</div>

            <span style={{color:"#3FB950",fontSize:11}}>KOSPI · KOSDAQ · ETF 지원</span>

        </div>
      )}
    </div>

}

function App(){
  const[loaded,setLoaded]=useState(false);

  const[startYM,setStartYM]=useState({year:1985,month:1});
  const[endYM,setEndYM]=useState({year:2026,month:5});
  const[cumGran,setCumGran]=useState("annual");
  const[cumUnit,setCumUnit]=useState("pct");
  const[contribGran,setContribGran]=useState("annual");
  const[focusModel,setFocusModel]=useState("us_allweather");
  const[focusIdx,setFocusIdx]=useState(null);
  const[fxMode,setFxMode]=useState("local");
  const[baseCcy,setBaseCcy]=useState("USD");
  const[initAmt,setInitAmt]=useState(100000000);
  const[initAmtStr,setInitAmtStr]=useState("100,000,000");
  const[showCustom,setShowCustom]=useState(false);
  const[customs,setCustoms]=useState([]);
  const[editId,setEditId]=useState(null);

  // ── 데이터 로드 ──
  useEffect(()=>{
    fetch("https://raw.githubusercontent.com/Fm-D4vid/Asset-Backtest/main/data.json")
      .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();})
      .then(json=>{
        const meta=json.meta;
        YRS=meta.years;
        DATA=json.data;
        DATA_END={year:meta.end_year,month:meta.end_month};
        setDataMeta(meta);
        setStartYM({year:meta.start_year,month:1});
        setEndYM({year:meta.end_year,month:meta.end_month});
        setLoaded(true);
      })
      .catch(err=>{
        console.error("data.json 로드 실패:",err);
        setLoadError(err.message);
      });
  },[]);

  const maxYM=useMemo(()=>dataMeta?{year:dataMeta.end_year,month:dataMeta.end_month}:{year:2026,month:5},[dataMeta]);
  const regionModels=useMemo(()=>Object.entries(MODELS).filter(([_,m])=>m.region===selRegion),[selRegion]);
  const toggleModel=(k)=>{setSelModels(p=>{if(p.includes(k))return p.length>1?p.filter(x=>x!==k):p;if(p.length>=6)return p;return[...p,k];});setFocusModel(k);};
  const switchRegion=(r)=>{setSelRegion(r);const f=Object.entries(MODELS).filter(([_,m])=>m.region===r).map(([k])=>k);setSelModels(f.slice(0,2));setFocusModel(f[0]||"");};
  const handleInitAmt=(val)=>{const num=val.replace(/[^0-9]/g,"");setInitAmtStr(num?Number(num).toLocaleString("ko-KR"):"");setInitAmt(Number(num)||0);};
  const ccySym=baseCcy==="KRW"?"₩":baseCcy==="JPY"?"¥":"$";

  const addCustom=()=>{const id=Date.now().toString(36);const c={id,name:`커스텀 ${customs.length+1}`,alloc:{},active:false};setCustoms(p=>[...p,c]);setEditId(id);};
  const updateCustomField=(id,field,val)=>setCustoms(p=>p.map(c=>c.id===id?{...c,[field]:val}:c));
  const updateCustomAlloc=(id,asset,val)=>setCustoms(p=>p.map(c=>c.id===id?{...c,alloc:{...c.alloc,[asset]:val}}:c));
  const toggleCustomActive=(id)=>{setCustoms(p=>p.map(c=>c.id===id?{...c,active:!c.active}:c));const c=customs.find(x=>x.id===id);if(c&&!c.active)setFocusModel("__c_"+id);};
  const removeCustom=(id)=>setCustoms(p=>p.filter(c=>c.id!==id));
  const customTotal=(alloc)=>Object.values(alloc).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const customValid=(alloc)=>Math.abs(customTotal(alloc)-100)<0.01&&customTotal(alloc)>0;

  const combos=useMemo(()=>{
    if(!loaded)return[];
    const arr=selModels.map(m=>{const r=runBacktest(MODELS[m].alloc,startYM,endYM,rebal,cumGran,fxMode,baseCcy,initAmt);if(!r?.length)return null;const mk=MODELS[m];return{key:m,label:`${mk.name} (${REGIONS[mk.region]?.split(" ")[0]})`,color:mk.color,results:r,stats:stats(r,initAmt),alloc:mk.alloc};}).filter(Boolean);
    customs.filter(c=>c.active&&customValid(c.alloc)).forEach((c,i)=>{
      const cAlloc={};Object.entries(c.alloc).forEach(([k,v])=>{const n=parseFloat(v);if(n>0)cAlloc[k]=n;});
      const r=runBacktest(cAlloc,startYM,endYM,rebal,cumGran,fxMode,baseCcy,initAmt);
      if(r?.length)arr.push({key:"__c_"+c.id,label:c.name,color:CUSTOM_COLORS[i%CUSTOM_COLORS.length],results:r,stats:stats(r,initAmt),alloc:cAlloc});
    });
    return arr;
  },[loaded,selModels,rebal,startYM,endYM,cumGran,fxMode,baseCcy,initAmt,customs]);

  const cumData=useMemo(()=>{if(!combos.length)return[];const ml=Math.max(...combos.map(c=>c.results.length));return Array.from({length:ml},(_,i)=>{const pt={label:combos[0].results[i]?.label||""};combos.forEach(c=>{const v=c.results[i]?.cumulative;pt[c.key+"_pct"]=v?((v/initAmt-1)*100):null;pt[c.key+"_amt"]=v||null;});return pt;});},[combos,initAmt]);
  const annualData=useMemo(()=>{if(!combos.length)return[];const ay=[...new Set(combos.flatMap(c=>c.results.map(r=>r.year)))].sort();return ay.map(y=>{const pt={year:y};combos.forEach(c=>{const yrs=c.results.filter(r=>r.year===y);const a=yrs.reduce((cum,r)=>cum*(1+r.return/100),1)-1;pt[c.key]=parseFloat((a*100).toFixed(1));});return pt;});},[combos]);

  const focusAlloc=useMemo(()=>{
    if(focusModel.startsWith("__c_")){const id=focusModel.slice(4);const c=customs.find(x=>x.id===id);if(!c)return{};const a={};Object.entries(c.alloc).forEach(([k,v])=>{const n=parseFloat(v);if(n>0)a[k]=n;});return a;}
    return MODELS[focusModel]?.alloc||{};
  },[focusModel,customs]);
  const focusLabel=focusModel.startsWith("__c_")?(customs.find(c=>c.id===focusModel.slice(4))?.name||"커스텀"):(MODELS[focusModel]?.name||"");
  const contribResults=useMemo(()=>loaded?runBacktest(focusAlloc,startYM,endYM,rebal,contribGran,fxMode,baseCcy,initAmt):null,[loaded,focusAlloc,startYM,endYM,rebal,contribGran,fxMode,baseCcy,initAmt]);
  const contribData=useMemo(()=>{if(!contribResults)return[];return contribResults.map(r=>{const pt={label:r.label};Object.keys(focusAlloc).forEach(a=>{pt[a]=parseFloat((r.contributions[a]||0).toFixed(2));});return pt;});},[contribResults,focusAlloc]);
  const focusDetail=focusIdx!==null&&contribResults?.[focusIdx]||null;

  const fmtAmt=(v)=>{if(baseCcy==="KRW"){if(Math.abs(v)>=1e8)return`${ccySym}${(v/1e8).toFixed(1)}억`;if(Math.abs(v)>=1e4)return`${ccySym}${(v/1e4).toFixed(0)}만`;return`${ccySym}${Math.round(v).toLocaleString()}`;}if(Math.abs(v)>=1e6)return`${ccySym}${(v/1e6).toFixed(2)}M`;return`${ccySym}${Math.round(v).toLocaleString()}`;};
  const fmtPct=(v)=>`${v>=0?"+":""}${v.toFixed(1)}%`;
  const tI=(d)=>{const l=d.length;return l>200?23:l>80?7:l>30?3:Math.max(0,Math.floor(l/12));};

  // ── 로드 에러 ──
  if(loadError)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,padding:40}}>
      <div style={{fontSize:48}}>⚠️</div>
      <div style={{fontSize:16,color:"#FF7B72",fontWeight:600}}>data.json 로드 실패</div>
      <div style={{fontSize:13,color:"#768390",textAlign:"center",maxWidth:500,lineHeight:1.8}}>

        <strong>해결 방법:</strong><br/>

        2. index.html과 같은 폴더에 data.json 배치<br/>
        3. Cloudflare Pages에 함께 배포
      </div>
    </div>
  );

  // ── 로딩 ──
  if(!loaded)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{fontSize:13,color:"#3FB950",letterSpacing:2}}>데이터 로딩 중...</div>
    </div>

    <div style={S.page}><style>{`

    `}</style>
