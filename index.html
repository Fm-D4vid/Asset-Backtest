    <div style={S.controls}>
      <div style={S.cg}><div style={S.cl}>지역</div><div style={S.cr}>{Object.entries(REGIONS).map(([k,v])=><button key={k} className={`rg ${selRegion===k?"on":""}`} onClick={()=>switchRegion(k)}>{v}</button>)}</div></div>
      <div style={S.cg}><div style={S.cl}>모델 (최대 6)</div><div style={S.cr}>{regionModels.map(([k,m])=><button key={k} className={`cb ${selModels.includes(k)?"on":""}`} style={{"--ac":m.color,"--ac-bg":m.color+"15"}} onClick={()=>toggleModel(k)}><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:m.color,marginRight:6}}/>{m.name}</button>)}</div></div>
      <div style={S.cg}><div style={S.cl}>리밸런싱</div><div style={S.cr}>{REBAL_OPTIONS.map(r=><button key={r.key} className={`rb ${rebal===r.key?"on":""}`} onClick={()=>setRebal(r.key)}>{r.label}</button>)}</div></div>
    </div>
    <div style={{...S.controls,borderTop:"none",paddingTop:0}}>
      <div style={S.cg}><div style={S.cl}>기간</div><div style={{display:"flex",alignItems:"center",gap:8}}>
        <MonthPicker value={startYM} onChange={(v)=>{setStartYM(v);if(v.year>endYM.year||(v.year===endYM.year&&v.month>endYM.month))setEndYM(v);}} maxYM={maxYM} />
        <span style={{color:"#636E7B"}}>~</span>
        <MonthPicker value={endYM} onChange={setEndYM} minYM={startYM} maxYM={maxYM} />
      </div></div>
      <div style={S.cg}><div style={S.cl}>환율</div><div style={S.cr}>{FX_MODES.map(f=><button key={f.key} className={`fx ${fxMode===f.key?"on":""}`} onClick={()=>setFxMode(f.key)}>{f.label}</button>)}</div></div>
      {fxMode!=="local"&&<div style={S.cg}><div style={S.cl}>기준 통화</div><div style={S.cr}>{BASE_CCYS.map(c=><button key={c.key} className={`fx ${baseCcy===c.key?"on":""}`} onClick={()=>setBaseCcy(c.key)}>{c.label}</button>)}</div></div>}
      <div style={S.cg}><div style={S.cl}>초기 투자금</div><div style={{position:"relative",display:"flex",alignItems:"center"}}><input type="text" value={initAmtStr} onChange={e=>handleInitAmt(e.target.value)} style={{...S.sel,width:180,paddingRight:30}}/><span style={{position:"absolute",right:10,color:"#636E7B",fontSize:11,pointerEvents:"none"}}>{baseCcy==="KRW"?"원":baseCcy==="JPY"?"¥":"$"}</span></div></div>
    </div>

    {/* ── CUSTOM BUILDER ── */}
    <div style={{padding:"0 48px",borderBottom:"1px solid #E8E2DA"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setShowCustom(!showCustom)} style={{background:"none",border:"none",color:"#3FB950",fontSize:13,fontWeight:600,cursor:"pointer",padding:"14px 0",fontFamily:"'Noto Sans KR'"}}>
          <span style={{fontSize:14,marginRight:6}}>{showCustom?"▼":"▶"}</span>맞춤 포트폴리오 빌더
        </button>
        {customs.filter(c=>c.active).length>0&&<span style={{fontSize:11,color:"#3FB950",fontFamily:"'DM Mono'"}}>{customs.filter(c=>c.active).length}개 활성</span>}
      </div>
      {showCustom&&(
        <div style={{paddingBottom:20,animation:"fadeIn 0.2s ease"}}>
          {customs.map((c,ci)=>{const tot=customTotal(c.alloc);const valid=customValid(c.alloc);const isEdit=editId===c.id;const col=CUSTOM_COLORS[ci%CUSTOM_COLORS.length];return(
            <div key={c.id} style={{marginBottom:12,border:`1px solid ${c.active?col+"40":"rgba(48,54,61,0.8)"}`,borderRadius:10,padding:14,background:c.active?col+"08":"#161B22"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isEdit?12:0}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>
                <input type="text" value={c.name} onChange={e=>updateCustomField(c.id,"name",e.target.value)} style={{background:"transparent",border:"none",color:"#E6EDF3",fontSize:14,fontWeight:600,fontFamily:"'Noto Sans KR'",flex:1,outline:"none"}}/>
                <span style={{fontFamily:"'DM Mono'",fontSize:12,color:valid?"#3FB950":tot>100?"#FF7B72":"#3FB950"}}>{tot.toFixed(1)}%{valid?" ✓":""}</span>
                <button onClick={()=>setEditId(isEdit?null:c.id)} style={{background:"none",border:"1px solid #E8E2DA",borderRadius:4,color:"#768390",fontSize:11,padding:"4px 8px",cursor:"pointer"}}>{isEdit?"접기":"편집"}</button>
                <button onClick={()=>{if(valid)toggleCustomActive(c.id);}} style={{background:c.active?col:"#161B22",border:`1px solid ${c.active?col:"rgba(48,54,61,0.7)"}`,borderRadius:4,color:c.active?"#161B22":"#768390",fontSize:11,fontWeight:600,padding:"4px 10px",cursor:valid?"pointer":"not-allowed",opacity:valid?1:0.4}}>{c.active?"ON":"OFF"}</button>
                <button onClick={()=>removeCustom(c.id)} style={{background:"none",border:"none",color:"#FF7B72",fontSize:14,cursor:"pointer",padding:"2px 6px"}}>✕</button>
              </div>
              {isEdit&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:4}}>
                  {Object.entries(ASSETS).filter(([k])=>!k.startsWith("fx_")).map(([key,asset])=>(
                    <div key={key} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 8px",background:parseFloat(c.alloc[key])>0?col+"10":"#161B22",border:`1px solid ${parseFloat(c.alloc[key])>0?col+"30":"rgba(48,54,61,0.8)"}`,borderRadius:5}}>
                      <span style={{width:7,height:7,borderRadius:2,background:AC[key]||"#888",flexShrink:0}}/>
                      <span style={{flex:1,fontSize:10,color:"#ADBAC7"}}>{asset.short}</span>
                      <input type="number" min="0" max="100" step="0.5" value={c.alloc[key]||""} placeholder="0" onChange={e=>updateCustomAlloc(c.id,key,e.target.value)}
                        style={{width:48,padding:"3px 5px",background:"#161B22",border:"1px solid #E8E2DA",borderRadius:3,color:col,fontSize:11,fontFamily:"'DM Mono'",textAlign:"right",outline:"none"}}/>
                      <span style={{fontSize:9,color:"#636E7B"}}>%</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );})}
          <button onClick={addCustom} style={{padding:"8px 18px",background:"rgba(63,185,80,0.08)",border:"1px solid rgba(92,122,94,0.25)",borderRadius:6,color:"#3FB950",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans KR'"}}>+ 새 포트폴리오 추가</button>
        </div>
      )}
    </div>

    {!combos.length?<div style={{textAlign:"center",padding:60,color:"#636E7B"}}>모델을 선택하거나 커스텀 포트폴리오를 활성화해주세요</div>:(<>

    {/* ── SUMMARY ── */}
    <div style={{display:"flex",gap:10,padding:"20px 48px",flexWrap:"wrap",borderBottom:"1px solid #E8E2DA"}}>
      {combos.map(c=>(<div key={c.key} style={{flex:"1 1 200px",background:"#161B22",border:`1px solid ${c.color}25`,borderLeft:`3px solid ${c.color}`,borderRadius:8,padding:"14px 16px",minWidth:190}}>
        <div style={{fontSize:12,color:c.color,fontWeight:600,marginBottom:6}}>{c.label}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 14px",fontSize:11}}>
          <div><span style={{color:"#636E7B"}}>CAGR</span><div style={{fontFamily:"'DM Mono'",color:"#3FB950",fontSize:15,fontWeight:500}}>{c.stats.cagr}%</div></div>
          <div><span style={{color:"#636E7B"}}>총 수익률</span><div style={{fontFamily:"'DM Mono'",color:"#CDD9E5",fontSize:13}}>{c.stats.totalReturn}%</div></div>
          <div><span style={{color:"#636E7B"}}>변동성</span><div style={{fontFamily:"'DM Mono'",color:"#768390"}}>{c.stats.volatility}%</div></div>
          <div><span style={{color:"#636E7B"}}>샤프</span><div style={{fontFamily:"'DM Mono'",color:parseFloat(c.stats.sharpe)>0.5?"#3FB950":"#3FB950"}}>{c.stats.sharpe}</div></div>
          <div><span style={{color:"#636E7B"}}>MDD</span><div style={{fontFamily:"'DM Mono'",color:"#FF7B72"}}>-{c.stats.mdd}%</div></div>
          <div><span style={{color:"#636E7B"}}>최종</span><div style={{fontFamily:"'DM Mono'",color:"#CDD9E5",fontSize:12}}>{fmtAmt(c.stats.finalAmt)}</div></div>
        </div>
      </div>))}
    </div>

    {/* ── CUMULATIVE ── */}
    <div style={S.sec}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={S.secTitle}>누적 수익률</div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{display:"flex",gap:4}}>{CUM_UNITS.map(u=><button key={u.key} className={`gb ${cumUnit===u.key?"on":""}`} onClick={()=>setCumUnit(u.key)}>{u.label}</button>)}</div>
          <div style={{display:"flex",gap:4}}>{Object.entries(GRAN).map(([k,v])=><button key={k} className={`gb ${cumGran===k?"on":""}`} onClick={()=>setCumGran(k)}>{v}</button>)}</div>
        </div>
      </div>
      <ResponsiveContainer width="100%" height={400}>
        <LineChart data={cumData} margin={{top:10,right:20,bottom:5,left:10}}>
          <CartesianGrid stroke="rgba(26,35,50,0.06)"/><XAxis dataKey="label" tick={{fill:"#636E7B",fontSize:10,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={{stroke:"rgba(110,118,129,0.2)"}} interval={tI(cumData)}/>
          <YAxis tick={{fill:"#636E7B",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false} tickFormatter={cumUnit==="pct"?v=>`${v.toFixed(0)}%`:v=>fmtAmt(v)}/>
          <Tooltip contentStyle={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:12}} labelStyle={{color:"#768390"}} formatter={(v,name)=>{const c=combos.find(c=>name.startsWith(c.key));return cumUnit==="pct"?[fmtPct(v),c?.label||name]:[fmtAmt(v),c?.label||name];}}/>
          <ReferenceLine y={0} stroke="rgba(26,26,26,0.08)" strokeDasharray="4 4"/>
          {combos.map(c=><Line key={c.key} type="monotone" dataKey={c.key+(cumUnit==="pct"?"_pct":"_amt")} stroke={c.color} strokeWidth={2} dot={false} connectNulls/>)}
        </LineChart>
      </ResponsiveContainer>
    </div>

    {/* ── ANNUAL BAR ── */}
    <div style={S.sec}>
      <div style={S.secTitle}>연도별 수익률 (%)</div>
      <ResponsiveContainer width="100%" height={300}>
        <BarChart data={annualData} margin={{top:10,right:20,bottom:5,left:10}}>
          <CartesianGrid stroke="rgba(26,35,50,0.06)"/><XAxis dataKey="year" tick={{fill:"#636E7B",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={{stroke:"rgba(110,118,129,0.2)"}} interval={Math.max(0,Math.floor(annualData.length/15))}/>
          <YAxis tick={{fill:"#636E7B",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/><ReferenceLine y={0} stroke="rgba(110,118,129,0.2)"/>
          <Tooltip contentStyle={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:12}} labelStyle={{color:"#768390"}} formatter={(v,name)=>[`${v}%`,combos.find(c=>c.key===name)?.label||name]}/>
          {combos.map(c=><Bar key={c.key} dataKey={c.key} fill={c.color} opacity={0.8} radius={[2,2,0,0]}/>)}
        </BarChart>
      </ResponsiveContainer>
    </div>

    {/* ── CONTRIBUTION ── */}
    <div style={S.sec}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={S.secTitle}>자산군별 기여도 분석</div><div style={{fontSize:12,color:"#636E7B",marginTop:2}}>바를 클릭하면 상세 분해를 볼 수 있습니다</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{display:"flex",gap:4}}>{Object.entries(GRAN).map(([k,v])=><button key={k} className={`gb ${contribGran===k?"on":""}`} onClick={()=>{setContribGran(k);setFocusIdx(null);}}>{v}</button>)}</div>
          <select value={focusModel} onChange={e=>{setFocusModel(e.target.value);setFocusIdx(null);}} style={S.sel}>
            {selModels.map(k=>MODELS[k]?<option key={k} value={k}>{MODELS[k].name} ({REGIONS[MODELS[k].region]?.split(" ")[0]})</option>:null)}
            {customs.filter(c=>c.active&&customValid(c.alloc)).map(c=><option key={"__c_"+c.id} value={"__c_"+c.id}>{c.name}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"flex",gap:20,marginTop:8}}>
        <div style={{flex:1,minWidth:0}}>
          <ResponsiveContainer width="100%" height={340}>
            <BarChart data={contribData} stackOffset="sign" margin={{top:10,right:20,bottom:5,left:10}} onClick={e=>{if(e?.activeTooltipIndex!=null)setFocusIdx(e.activeTooltipIndex);}}>
              <CartesianGrid stroke="rgba(26,35,50,0.06)"/><XAxis dataKey="label" tick={{fill:"#636E7B",fontSize:contribGran==="monthly"?8:10,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={{stroke:"rgba(110,118,129,0.2)"}} interval={contribGran==="monthly"?11:contribGran==="quarterly"?3:Math.max(0,Math.floor(contribData.length/15))}/>
              <YAxis tick={{fill:"#636E7B",fontSize:11,fontFamily:"'DM Mono'"}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/><ReferenceLine y={0} stroke="rgba(110,118,129,0.2)"/>
              <Tooltip contentStyle={{background:"#161B22",border:"1px solid #E8E2DA",borderRadius:8,fontFamily:"'DM Mono'",fontSize:12}} labelStyle={{color:"#768390"}} formatter={(v,name)=>[`${v}%`,ASSETS[name]?.short||name]}/>
              {Object.keys(focusAlloc).map(a=><Bar key={a} dataKey={a} stackId="stack" fill={AC[a]||"#888"} style={{cursor:"pointer"}}/>)}
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={S.dp}>{focusDetail?(
          <div style={{animation:"fadeIn 0.25s ease"}}>
            <div style={{fontSize:12,color:"#768390",marginBottom:4}}>상세 분해</div>
            <div style={{fontFamily:"'DM Mono'",fontSize:24,color:"#3FB950",marginBottom:4}}>{focusDetail.label}</div>
            <div style={{fontSize:11,color:"#636E7B",marginBottom:14}}>{focusLabel}</div>
            {Object.entries(focusDetail.contributions).sort((a,b)=>b[1]-a[1]).map(([asset,contrib])=>(
              <div key={asset} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid #F0EDE8"}}>
                <span style={{width:8,height:8,borderRadius:2,background:AC[asset],flexShrink:0}}/><span style={{flex:1,fontSize:11,color:"#ADBAC7",lineHeight:1.3}}>{ASSETS[asset]?.short||asset}</span>
                <span style={{fontFamily:"'DM Mono'",fontSize:13,fontWeight:500,color:contrib>0?"#3FB950":contrib<0?"#FF7B72":"#888",flexShrink:0}}>{contrib>0?"+":""}{contrib.toFixed(2)}%</span>
              </div>
            ))}
            <div style={{borderTop:"1px solid #E8E2DA",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:13,color:"#ADBAC7",fontWeight:700}}>합계</span>
              <span style={{fontFamily:"'DM Mono'",fontSize:14,fontWeight:700,color:focusDetail.return>0?"#3FB950":"#FF7B72"}}>{focusDetail.return>0?"+":""}{focusDetail.return.toFixed(2)}%</span>
            </div>
          </div>
        ):<div style={{color:"#636E7B",fontSize:13,textAlign:"center",paddingTop:60}}>← 차트에서 바를<br/>클릭하세요</div>}</div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:14,marginTop:14,padding:"12px 0",borderTop:"1px solid #F0EDE8"}}>
        {Object.keys(focusAlloc).map(a=>(<div key={a} style={{display:"flex",alignItems:"flex-start",gap:6}}><span style={{width:10,height:10,borderRadius:2,background:AC[a],marginTop:3,flexShrink:0}}/><div><div style={{fontSize:12,color:"#ADBAC7",fontWeight:500}}>{ASSETS[a]?.short} ({focusAlloc[a]}%)</div><div style={{fontSize:10,color:"#636E7B",marginTop:1}}>{ASSETS[a]?.full}</div></div></div>))}
      </div>
    </div>

    {/* ── TABLE ── */}
    <div style={S.sec}>
      <div style={S.secTitle}>성과 비교 테이블</div>
      <div style={{overflowX:"auto",marginTop:14}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["모델","CAGR","총 수익률","변동성","샤프","MDD","최종 금액","최고의 해","최악의 해"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
        <tbody>{combos.map(c=>(<tr key={c.key} style={{borderBottom:"1px solid #F0EDE8"}}>
          <td style={S.td}><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:c.color,marginRight:8}}/><span style={{color:"#E6EDF3"}}>{c.label}</span></td>
          <td style={{...S.td,color:"#3FB950"}}>{c.stats.cagr}%</td><td style={S.td}>{c.stats.totalReturn}%</td><td style={S.td}>{c.stats.volatility}%</td>
          <td style={{...S.td,color:parseFloat(c.stats.sharpe)>0.5?"#3FB950":"#3FB950"}}>{c.stats.sharpe}</td>
          <td style={{...S.td,color:"#FF7B72"}}>-{c.stats.mdd}%</td><td style={{...S.td,color:"#3FB950"}}>{fmtAmt(c.stats.finalAmt)}</td>
          <td style={{...S.td,color:"#3FB950",fontSize:12}}>{c.stats.bestYear}</td><td style={{...S.td,color:"#FF7B72",fontSize:12}}>{c.stats.worstYear}</td>
        </tr>))}</tbody></table>
      </div>
    </div>

    <div style={{padding:"20px 48px 32px"}}><div style={{fontSize:11,color:"#636E7B",lineHeight:2}}>
      <strong style={{color:"#768390"}}>데이터 출처 (ETF Adjusted Price via FinanceDataReader)</strong><br/>
      미국: SPY (S&P 500) | TLT (20Y+채권) | IEF (7-10Y채권) | SHY (1-3Y채권) | TIP (TIPS) | VNQ (리츠) | BIL (T-Bill) | GLD (금) | GSG (원자재)<br/>
      한국: 069500 (KODEX 200) | 148070 (국고채10년) | 114260 (국고채3년) | 130730 (단기자금)<br/>
      일본: 1306.T (TOPIX) | 1343.T (J-REIT) | BOJ O/N Call Rate<br/>
      환율: USD/KRW · USD/JPY (FinanceDataReader)
    </div><div style={{fontSize:11,color:"#636E7B",marginTop:6}}>
      ※ ETF Adjusted Close = 배당 재투자 반영 Total Return | ETF 미상장 기간은 인덱스 학술데이터 폴백<br/>
      ※ <code style={{fontSize:10,background:"#161B22",padding:"1px 4px",borderRadius:2}}>python fetch_data.py</code> 실행으로 data.json 갱신 | {dataMeta?.generated} 기준
    </div></div>
    </>)}
    </>)}
    {/* end backtest tab */}
    </div>
  );
}

const S={
  page:{fontFamily:"'Noto Sans KR',sans-serif",background:"#0D1117",color:"#E6EDF3",minHeight:"100vh",maxWidth:1440,margin:"0 auto"},
  header:{padding:"36px 48px 24px",borderBottom:"1px solid rgba(48,54,61,0.8)",background:"#010409"},
  tag:{fontFamily:"'DM Mono'",fontSize:10,letterSpacing:4,color:"#3FB950",marginBottom:8,textTransform:"uppercase"},
  title:{fontFamily:"'Noto Sans KR',sans-serif",fontSize:26,color:"#E6EDF3",letterSpacing:-0.3,marginBottom:6,fontWeight:700},
  sub:{fontSize:12,color:"#636E7B",fontFamily:"'Noto Sans KR',sans-serif",letterSpacing:0.2},
  controls:{display:"flex",alignItems:"flex-end",gap:20,padding:"14px 48px",borderBottom:"1px solid rgba(48,54,61,0.8)",flexWrap:"wrap",background:"#0D1117"},
  cg:{},
  cl:{fontSize:10,color:"#636E7B",marginBottom:5,letterSpacing:1,fontFamily:"'Noto Sans KR',sans-serif",textTransform:"uppercase",fontWeight:500},
  cr:{display:"flex",gap:4,flexWrap:"wrap"},
  sel:{padding:"6px 11px",background:"#161B22",border:"1px solid rgba(48,54,61,0.8)",borderRadius:6,color:"#E6EDF3",fontSize:12,fontFamily:"'DM Mono'",cursor:"pointer",outline:"none"},
  sec:{padding:"24px 48px",borderBottom:"1px solid rgba(48,54,61,0.8)",background:"#0D1117"},
  secTitle:{fontSize:15,fontFamily:"'Noto Sans KR',sans-serif",color:"#E6EDF3",marginBottom:10,fontWeight:700},
  dp:{width:280,flexShrink:0,background:"#161B22",border:"1px solid rgba(48,54,61,0.8)",borderRadius:10,padding:20,minHeight:300},
  th:{textAlign:"left",padding:"10px 14px",fontSize:10,color:"#636E7B",letterSpacing:0.8,borderBottom:"2px solid rgba(48,54,61,0.8)",whiteSpace:"nowrap",textTransform:"uppercase",fontWeight:500},
  td:{padding:"11px 14px",fontSize:12,color:"#ADBAC7",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
